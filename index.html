<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- ICON -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <title>Erika099</title>
</head>

<body>
    <!-- HEADER -->
    <header>
        <div class="logo-area">
            <!-- LOGO -->
            <img src="img/logo.png" class="logo-img" onclick="toggleMenu()" alt="Logo">

            <!-- NAMA -->
            <a href="#" class="logo">Erika099</a>

            <!-- DROPDOWN MENU -->
            <div class="settings-menu" id="settingsMenu">
                <a href="index.html" class="menu-btn">Home</a>
                <a href="pages/services.html" class="menu-btn">Services</a>
                <a href="pages/skills.html" class="menu-btn">Skills</a>
                <a href="pages/education.html" class="menu-btn">Education</a>
                <a href="pages/experience.html" class="menu-btn">Experience</a>
                <a href="pages/contact.html" class="menu-btn">Contact</a>
                <hr>
                <button class="menu-btn" onclick="toggleTheme()">🌙 Dark / Light</button>
                <a href="global/login.html" class="menu-btn">Login Admin</a>
            </div>
        </div>
    </header>

    <!-- HOME -->
    <section class="home">
        <!-- VIDEO ATAS -->
        <div class="top-video">
            <video autoplay muted loop playsinline>
                <source src="video/video-pc.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
            <div class="overlay"></div>
        </div>

        <!-- CONTENT -->
        <div class="home-content">
            <div class="home-img">
                <img src="img/main.jpg" alt="Main Image">
            </div>

            <h1>Hi, It's <span>Bismarck</span></h1>

            <h3 class="typing-text">
                I'm a <span class="typing"></span>
            </h3>

            <p>Website ini direkomendasikan untuk PC dan Laptop</p>

            <div class="social-icons">
                <!-- YOUTUBE -->
                <a href="https://youtube.com/@kingofbismarck?si=Lk5sX_Zd46cvmSvu" target="_blank">
                    <i class="fa-brands fa-youtube"></i>
                </a>

                <!-- X -->
                <a href="https://x.com/I443570I" target="_blank">
                    <i class="fa-brands fa-x-twitter"></i>
                </a>

                <!-- INSTAGRAM -->
                <a href="https://www.instagram.com/izanami_8888?igsh=MXN3N2t2NTlmYTZwMw==" target="_blank">
                    <i class="fa-brands fa-instagram"></i>
                </a>
            </div>

            <a href="global/login.html" class="btn">Let’s Work Together</a>
        </div>
    </section>
    
    <!-- VIDEO PC KANAN BAWAH -->
<div class="pc-video">
    <video autoplay loop muted playsinline>
        <source src="video/video2.mp4" type="video/mp4">
    </video>
</div>

    <!-- TYPED JS -->
    <script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.12"></script>
    <script>
        // TYPING EFFECT
        var typed = new Typed(".typing", {
            strings: ["Script Writer", "Web Developer", "Designer"],
            typeSpeed: 100,
            backSpeed: 50,
            loop: true
        });

        // MENU TOGGLE
        function toggleMenu() {
            document.getElementById("settingsMenu").classList.toggle("show");
        }

        // DARK/LIGHT MODE TOGGLE
        function toggleTheme() {
            document.body.classList.toggle("light-mode");
        }

        // CLOSE MENU WHEN CLICK OUTSIDE
        window.addEventListener("click", function (e) {
            if (!e.target.closest('.logo-area')) {
                const menu = document.getElementById("settingsMenu");
                if (menu.classList.contains("show")) {
                    menu.classList.remove("show");
                }
            }
        });
    </script>
</body>

</html>
