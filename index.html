<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- FONT AWESOME -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <title>Erika099</title>
</head>

<body>

<!-- HEADER -->
<header>

    <div class="logo-area">

        <!-- LOGO -->
        <img src="img/logo.png" class="logo-img" onclick="toggleMenu()">

        <!-- NAMA -->
        <a href="#" class="logo">Erika099</a>

        <!-- DROPDOWN SETTINGS -->
        <div class="settings-menu" id="settingsMenu">

            <button class="menu-btn" onclick="toggleTheme()">
                🌙 Dark / Light
            </button>

            <a href="global/login.html" class="menu-btn">
                Login Admin
            </a>

        </div>

    </div>

    <!-- NAV -->
    <nav>

        <a href="index.html" class="active">Home</a>
        <a href="pages/services.html">Services</a>
        <a href="pages/skills.html">Skills</a>
        <a href="pages/education.html">Education</a>
        <a href="pages/experience.html">Experience</a>
        <a href="pages/contact.html">Contact</a>

    </nav>

</header>

<!-- HOME -->
<section class="home">

    <!-- VIDEO ATAS -->
    <div class="top-video">

        <video autoplay muted loop playsinline>
            <source src="video/video-pc.mp4" type="video/mp4">
        </video>

        <div class="overlay"></div>

    </div>

    <!-- KONTEN -->
    <div class="home-content">

        <div class="home-img">
            <img src="img/main.jpg">
        </div>

        <h1>Hi, It's <span>Bismarck</span></h1>

        <h3 class="typing-text">
            I'm a <span class="typing"></span>
        </h3>

        <p>Website ini direkomendasikan untuk PC dan Laptop</p>

        <div class="social-icons">

            <a href="#"><i class="fa-brands fa-linkedin"></i></a>
            <a href="#"><i class="fa-brands fa-github"></i></a>
            <a href="#"><i class="fa-brands fa-x-twitter"></i></a>
            <a href="#"><i class="fa-brands fa-instagram"></i></a>

        </div>

        <a href="global/login.html" class="btn">
            Let’s Work Together
        </a>

    </div>

</section>

<!-- TYPED JS -->
<script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.12"></script>

<script>

/* TYPING TEXT */

var typed = new Typed(".typing", {

    strings: [
        "Script Writer",
        "Web Developer",
        "Designer"
    ],

    typeSpeed: 100,
    backSpeed: 50,
    loop: true

});

/* MENU LOGO */

function toggleMenu(){

    let menu = document.getElementById("settingsMenu");

    menu.classList.toggle("show");

}

/* DARK MODE */

function toggleTheme(){

    document.body.classList.toggle("light-mode");

}

/* KLIK LUAR TUTUP MENU */

window.onclick = function(e){

    if(!e.target.matches('.logo-img')){

        let menu = document.getElementById("settingsMenu");

        if(menu.classList.contains("show")){
            menu.classList.remove("show");
        }

    }

}

</script>

</body>
                            </html>
