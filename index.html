<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VELR ZARTX</title>

<link rel="stylesheet" href="style.css">

<!-- THREE JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/controls/OrbitControls.js"></script>

</head>

<body>

<!-- HEADER -->
<header>

    <div class="logo-area">

        <img src="profil.jpg" class="logo-img" onclick="toggleMenu()">

        <h2 class="logo">VELR</h2>

        <div class="settings-menu" id="menu">

            <a href="#home" class="menu-btn">Home</a>
            <a href="#contact" class="menu-btn">Contact</a>

            <button onclick="toggleMode()" class="menu-btn">
                Light / Dark Mode
            </button>

            <a href="login.html" class="menu-btn">
                Logout
            </a>

        </div>

    </div>

    <nav>

        <a href="#home">Home</a>
        <a href="#contact">Contact</a>

    </nav>

</header>

<!-- HOME -->
<section class="home" id="home">

    <!-- VIDEO -->
    <div class="top-video">
        <video autoplay muted loop>
            <source src="video.mp4" type="video/mp4">
        </video>
        <div class="overlay"></div>
    </div>

    <!-- CONTENT -->
    <div class="home-content">

        <div class="home-img">
            <img src="profil.jpg">
        </div>

        <h1>Hello, I'm <span>VELR ZARTX</span></h1>

        <p class="typing-text">
            Web Developer | Cyber Security | Programmer
        </p>

        <a href="#contact" class="btn">
            Contact Me
        </a>

        <!-- GLOBE -->
        <div id="globe-container"></div>

    </div>

</section>

<!-- CONTACT -->
<section class="contact" id="contact">

    <h1 class="title">Contact <span>Me</span></h1>

    <div class="contact-container">

        <form class="contact-form"
        action="https://api.whatsapp.com/send"
        method="get"
        target="_blank">

            <input
            type="text"
            name="text"
            placeholder="Nama Anda"
            required>

            <input
            type="text"
            placeholder="Pesan"
            required
            oninput="this.form.text.value=this.value">

            <button class="send-btn">
                Kirim WhatsApp
            </button>

        </form>

    </div>

</section>

<!-- ================= SCRIPT ================= -->

<script>

/* MENU */

function toggleMenu(){

    document
    .getElementById("menu")
    .classList.toggle("show");
}

/* LIGHT MODE */

function toggleMode(){

    document.body
    .classList.toggle("light-mode");
}

/* ================= GLOBE ================= */

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
75,
300/300,
0.1,
1000
);

const renderer = new THREE.WebGLRenderer({alpha:true});
renderer.setSize(300,300);
renderer.setPixelRatio(window.devicePixelRatio);

document
.getElementById("globe-container")
.appendChild(renderer.domElement);

/* CONTROL */

const controls =
new THREE.OrbitControls(
camera,
renderer.domElement
);

controls.enableZoom = true;
controls.enablePan = false;
controls.autoRotate = true;
controls.autoRotateSpeed = 1.2;

/* LIGHT */

const light =
new THREE.PointLight(0xff0000,2);

light.position.set(5,5,5);
scene.add(light);

const ambient =
new THREE.AmbientLight(0xff4d4d,1);

scene.add(ambient);

/* EARTH */

const loader =
new THREE.TextureLoader();

const earthTexture =
loader.load(
"https://threejsfundamentals.org/threejs/resources/images/earth-day.jpg"
);

const globe =
new THREE.Mesh(

new THREE.SphereGeometry(2,64,64),

new THREE.MeshStandardMaterial({

map:earthTexture,
emissive:0xb74b4b,
emissiveIntensity:0.3

})

);

scene.add(globe);

/* GLOW */

const glow =
new THREE.Mesh(

new THREE.SphereGeometry(2.15,64,64),

new THREE.MeshBasicMaterial({

color:0xff0000,
transparent:true,
opacity:0.15

})

);

scene.add(glow);

/* STARS */

const starsGeometry =
new THREE.BufferGeometry();

const starsMaterial =
new THREE.PointsMaterial({color:0xffffff});

const starsVertices = [];

for(let i=0;i<2000;i++){

starsVertices.push(
(Math.random()-0.5)*2000,
(Math.random()-0.5)*2000,
(Math.random()-0.5)*2000
);

}

starsGeometry.setAttribute(
'position',
new THREE.Float32BufferAttribute(
starsVertices,
3
)
);

const stars =
new THREE.Points(
starsGeometry,
starsMaterial
);

scene.add(stars);

/* CITY */

function createCity(lat,lon){

const r = 2;

const phi = (90-lat)*(Math.PI/180);
const theta = (lon+180)*(Math.PI/180);

const x = -(r*Math.sin(phi)*Math.cos(theta));
const y = r*Math.cos(phi);
const z = r*Math.sin(phi)*Math.sin(theta);

const city =
new THREE.Mesh(

new THREE.SphereGeometry(0.05,16,16),

new THREE.MeshBasicMaterial({color:0xff0000})

);

city.position.set(x,y,z);

scene.add(city);

return city.position;

}

const jakarta = createCity(-6.2,106.8);
const tokyo = createCity(35.6,139.6);
const london = createCity(51.5,-0.1);

/* CURVE */

function createCurve(a,b){

const curve =
new THREE.QuadraticBezierCurve3(
a,
new THREE.Vector3(0,3,0),
b
);

const points =
curve.getPoints(50);

const geometry =
new THREE.BufferGeometry()
.setFromPoints(points);

const material =
new THREE.LineBasicMaterial({
color:0xff0000
});

const line =
new THREE.Line(
geometry,
material
);

scene.add(line);

}

createCurve(jakarta,tokyo);
createCurve(jakarta,london);

/* CAMERA */

camera.position.z = 6;

/* ANIMATE */

function animate(){

requestAnimationFrame(animate);

glow.rotation.y += 0.002;
stars.rotation.y += 0.0005;

controls.update();

renderer.render(scene,camera);

}

animate();

</script>

</body>
</html>
