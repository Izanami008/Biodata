<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<style>
body{background:#0f172a;color:white;font-family:Arial;display:flex;justify-content:center;align-items:center;height:100vh;}
.box{background:#1e293b;padding:40px;border-radius:15px;width:350px;box-shadow:0 0 20px rgba(0,255,204,0.3);text-align:center;}
.box h2{margin-bottom:20px;}
input[type="text"], input[type="password"]{padding:12px;margin:10px 0;width:100%;border-radius:8px;border:none;outline:none;}
button{padding:12px;width:100%;margin-top:10px;background:#00ffcc;border:none;border-radius:8px;font-weight:bold;cursor:pointer;}
.error{color:red;margin-bottom:10px;}
.profile-img{width:80px;height:80px;border-radius:50%;object-fit:cover;margin-bottom:15px;border:2px solid #00ffcc;}
p.register-text{margin-top:15px;}
p.register-text a{color:#00ffcc;text-decoration:none;font-weight:bold;}
</style>
</head>
<body>

<div class="box">
<h2>Login</h2>
<img src="../img/default-profile.png" alt="Profile" class="profile-img" id="profilePreview">
<p class="error" id="errorMsg"></p>

<form id="loginForm">
<input type="text" id="username" placeholder="Username" required>
<input type="password" id="password" placeholder="Password" required>
<button type="submit">Login</button>
</form>

<p class="register-text">Belum punya akun? <a href="register.html">Register</a></p>
</div>

<script>
// Hardcode admin
const adminUser = "admin";
const adminPass = "123";
const adminFoto = "../img/admin-profile.png"; // Bisa diganti foto admin

// Ambil data user dari localStorage
function getUsers(){
    return JSON.parse(localStorage.getItem("users") || "[]");
}

// Preview foto user saat ketik username
const usernameInput = document.getElementById("username");
const profilePreview = document.getElementById("profilePreview");
usernameInput.addEventListener("input", function(){
    const val = usernameInput.value.trim();
    if(val === adminUser){
        profilePreview.src = adminFoto;
    } else {
        const users = getUsers();
        const user = users.find(u=>u.username.toLowerCase() === val.toLowerCase());
        if(user) profilePreview.src = user.foto || "../img/default-profile.png";
        else profilePreview.src = "../img/default-profile.png";
    }
});

// Login
document.getElementById("loginForm").addEventListener("submit", function(e){
    e.preventDefault();
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();
    const errorMsg = document.getElementById("errorMsg");

    // cek admin
    if(username === adminUser && password === adminPass){
        localStorage.setItem("adminLoggedIn", "true");
        window.location.href = "admin.html"; // arahkan ke admin.html
        return;
    }

    // cek user biasa
    const users = getUsers();
    const user = users.find(u=>u.username.toLowerCase()===username.toLowerCase() && u.password===password);
    if(user){
        localStorage.setItem("currentUser", JSON.stringify(user));
        window.location.href = "user.html"; // arahkan ke user.html
    } else {
        errorMsg.textContent = "Username atau password salah!";
    }
});
</script>

</body>
</html>
