<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>
<style>
body{
    background:#0f172a;
    color:white;
    font-family:Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.box{
    background:#1e293b;
    padding:40px;
    border-radius:15px;
    width:350px;
    box-shadow:0 0 20px rgba(0,255,204,0.3);
    text-align:center;
}
.box h2{
    margin-bottom:20px;
}
input[type="text"], input[type="password"], input[type="file"]{
    padding:12px;
    margin:10px 0;
    width:100%;
    border-radius:8px;
    border:none;
    outline:none;
}
button{
    padding:12px;
    width:100%;
    margin-top:10px;
    background:#00ffcc;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
}
p.login-text{
    margin-top:15px;
}
p.login-text a{
    color:#00ffcc;
    text-decoration:none;
    font-weight:bold;
}
.profile-img{
    width:80px;
    height:80px;
    border-radius:50%;
    object-fit:cover;
    margin-bottom:15px;
    border:2px solid #00ffcc;
}
</style>
</head>
<body>

<div class="box">

<h2>Register</h2>

<img src="../img/default-profile.png" alt="Profile" class="profile-img" id="profilePreview">

<form id="registerForm">
<input type="text" id="username" placeholder="Username" required>
<input type="password" id="password" placeholder="Password" required>
<input type="file" id="profilePic" accept="image/*">
<button type="submit">Register</button>
</form>

<p class="login-text">Sudah punya akun? <a href="login.html">Login</a></p>

</div>

<script>
// Preview profil
document.getElementById("profilePic").addEventListener("change", function(e){
    const file = e.target.files[0];
    if(file){
        document.getElementById("profilePreview").src = URL.createObjectURL(file);
    }
});

// Simpan user baru di localStorage
document.getElementById("registerForm").addEventListener("submit", function(e){
    e.preventDefault();

    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;
    const profileImg = document.getElementById("profilePreview").src;

    // Ambil users lama
    const users = JSON.parse(localStorage.getItem("users") || "[]");

    // cek duplicate username
    if(users.find(u => u.username === username)){
        alert("Username sudah ada!");
        return;
    }

    // Tambahkan user baru
    users.push({username,password,profile:profileImg});
    localStorage.setItem("users", JSON.stringify(users));

    alert("Register berhasil! Silahkan login.");
    window.location.href = "login.html";
});
</script>

</body>
</html>
