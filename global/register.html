<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>
<link rel="stylesheet" href="../style.css">
</head>
<body>

<div class="box">
<h2>Register</h2>
<img src="../img/default-profile.png" class="profile-img" id="profilePreview">

<form id="registerForm">
<input type="text" id="username" placeholder="Username" required>
<input type="password" id="password" placeholder="Password" required>
<input type="file" id="profilePic" accept="image/*">
<button type="submit">Register</button>
</form>

<p class="login-text">Sudah punya akun? <a href="login.html">Login</a></p>
</div>

<script>
document.getElementById("profilePic").addEventListener("change", function(e){
    const file = e.target.files[0];
    if(file){ document.getElementById("profilePreview").src = URL.createObjectURL(file); }
});

document.getElementById("registerForm").addEventListener("submit", function(e){
    e.preventDefault();
    const username=document.getElementById("username").value;
    const password=document.getElementById("password").value;
    const profile=document.getElementById("profilePreview").src;

    const users = JSON.parse(localStorage.getItem("users") || "[]");
    if(users.find(u=>u.username===username)){ alert("Username sudah ada!"); return; }
    users.push({username,password,profile});
    localStorage.setItem("users", JSON.stringify(users));
    alert("Register berhasil! Silahkan login.");
    window.location.href="login.html";
});
</script>
</body>
</html>
