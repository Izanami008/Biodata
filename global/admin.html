<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>
<style>
body{margin:0;font-family:Arial;background:#f4f4f4;color:#333;display:flex;}
.sidebar{width:220px;background:#2c3e50;color:#fff;display:flex;flex-direction:column;padding:20px;align-items:center;}
.sidebar img{width:80px;height:80px;border-radius:50%;margin-bottom:15px;border:2px solid #2980b9;}
.sidebar h2{text-align:center;margin-bottom:20px;}
.sidebar a{color:#fff;text-decoration:none;padding:10px;display:block;margin-bottom:5px;border-radius:5px;}
.sidebar a:hover{background:#34495e;}
.main{flex:1;padding:20px;position:relative;}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.header h1{color:#2c3e50;}
.logout-btn{padding:5px 15px;border:none;border-radius:5px;background:#e74c3c;color:white;cursor:pointer;}
.toggle-btn{padding:5px 10px;border:none;border-radius:5px;background:#2980b9;color:white;cursor:pointer;}
.cards{display:flex;gap:20px;margin-bottom:20px;flex-wrap:wrap;}
.card{flex:1;min-width:150px;background:white;padding:15px;border-radius:10px;box-shadow:0 2px 5px rgba(0,0,0,0.1);}
.card h3{margin-bottom:10px;color:#2980b9;}
.table-container{background:white;padding:15px;border-radius:10px;box-shadow:0 2px 5px rgba(0,0,0,0.1);}
table{width:100%;border-collapse:collapse;}
table th, table td{padding:10px;text-align:left;border-bottom:1px solid #ddd;}
table th{background:#2980b9;color:white;}
.photo{width:40px;height:40px;border-radius:50%;object-fit:cover;}
button{padding:5px 10px;border:none;border-radius:5px;background:#2980b9;color:white;cursor:pointer;margin-right:5px;}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);justify-content:center;align-items:center;}
.modal-content{background:white;padding:20px;border-radius:10px;width:90%;max-width:400px;position:relative;}
.close{position:absolute;top:10px;right:15px;font-size:20px;cursor:pointer;}
.modal-content input, .modal-content select{width:100%;padding:8px;margin-top:5px;margin-bottom:10px;border-radius:5px;border:1px solid #ccc;}
.light-mode body{background:#fff;color:#333;}
.light-mode .sidebar{background:#2980b9;}
</style>
</head>
<body>

<div class="sidebar">
<img src="https://via.placeholder.com/80?text=Admin" alt="Logo Admin">
<h2>Admin Panel</h2>
<a href="#">Dashboard</a>
<a href="#">Data User</a>
<a href="#">Foto</a>
</div>

<div class="main">
<div class="header">
<h1>Dashboard</h1>
<div>
<button class="toggle-btn" id="themeToggle">Dark/Light</button>
<button class="logout-btn" onclick="window.location.href='login.html'">Logout</button>
</div>
</div>

<div class="cards">
<div class="card">
<h3>Total User</h3>
<p id="totalUser">0</p>
</div>
<div class="card">
<h3>Total Foto</h3>
<p id="totalFoto">0</p>
</div>
</div>

<div class="table-container">
<button id="addUserBtn">Tambah User</button>
<table>
<thead>
<tr><th>No</th><th>Nama</th><th>Email</th><th>Foto</th><th>Role</th><th>Aksi</th></tr>
</thead>
<tbody id="userTableBody"></tbody>
</table>
</div>
</div>

<div class="modal" id="userModal">
<div class="modal-content">
<span class="close" id="closeModal">&times;</span>
<h3 id="modalTitle">Tambah User</h3>
<form id="userForm">
<label>Nama</label><input type="text" name="nama" required>
<label>Email</label><input type="email" name="email" required>
<label>Role</label><select name="role"><option value="Admin">Admin</option><option value="User">User</option></select>
<label>Password</label><input type="password" name="password">
<label>Foto (URL)</label><input type="text" name="foto" placeholder="https://example.com/photo.jpg">
<button type="submit">Simpan</button>
</form>
</div>
</div>

<script>
const body = document.body;
const themeToggle = document.getElementById('themeToggle');
const modal = document.getElementById('userModal');
const addUserBtn = document.getElementById('addUserBtn');
const closeModal = document.getElementById('closeModal');
const userForm = document.getElementById('userForm');
const userTableBody = document.getElementById('userTableBody');
const totalUser = document.getElementById('totalUser');
const totalFoto = document.getElementById('totalFoto');

let editIndex = null;

// Toggle Dark/Light
themeToggle.onclick = () => body.classList.toggle('light-mode');

// Modal open/close
addUserBtn.onclick = () => { editIndex = null; document.getElementById('modalTitle').innerText='Tambah User'; userForm.reset(); modal.style.display='flex'; }
closeModal.onclick = () => modal.style.display='none';
window.onclick = e => { if(e.target==modal) modal.style.display='none'; }

// Load data from localStorage or default
let users = JSON.parse(localStorage.getItem('users')) || [
    {nama:'John Doe',email:'john@example.com',role:'Admin',foto:'https://via.placeholder.com/40'},
    {nama:'Jane Smith',email:'jane@example.com',role:'User',foto:'https://via.placeholder.com/40'}
];

function renderTable(){
    userTableBody.innerHTML = '';
    users.forEach((u,i)=>{
        const tr = document.createElement('tr');
        tr.innerHTML = `
        <td>${i+1}</td>
        <td>${u.nama}</td>
        <td>${u.email}</td>
        <td>${u.foto ? `<img src="${u.foto}" class="photo">` : ''}</td>
        <td>${u.role}</td>
        <td>
        <button onclick="editUser(${i})">Edit</button>
        <button onclick="deleteUser(${i})">Hapus</button>
        </td>`;
        userTableBody.appendChild(tr);
    });
    totalUser.innerText = users.length;
    totalFoto.innerText = users.filter(u=>u.foto).length;
    localStorage.setItem('users',JSON.stringify(users));
}

// Add/Edit User
userForm.onsubmit = function(e){
    e.preventDefault();
    const formData = new FormData(userForm);
    const newUser = {
        nama: formData.get('nama'),
        email: formData.get('email'),
        role: formData.get('role'),
        foto: formData.get('foto')
    };
    if(editIndex!==null){
        users[editIndex] = newUser;
    } else {
        users.push(newUser);
    }
    renderTable();
    modal.style.display='none';
}

// Edit user
function editUser(i){
    editIndex = i;
    const u = users[i];
    document.getElementById('modalTitle').innerText='Edit User';
    userForm.nama.value = u.nama;
    userForm.email.value = u.email;
    userForm.role.value = u.role;
    userForm.foto.value = u.foto;
    modal.style.display='flex';
}

// Delete user
function deleteUser(i){
    if(confirm(`Hapus user ${users[i].nama}?`)){
        users.splice(i,1);
        renderTable();
    }
}

// Initial render
renderTable();
</script>

</body>
  </html>
