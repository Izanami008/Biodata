<script>

if(localStorage.getItem("adminLoggedIn")!=="true"){
window.location.href="login.html";
}

let users=JSON.parse(localStorage.getItem("users")||"[]");

function logout(){
localStorage.removeItem("adminLoggedIn");
window.location.href="login.html";
}

function renderTable(){

const body=document.getElementById("userTableBody");
body.innerHTML="";

users.forEach((u,i)=>{

body.innerHTML+=`
<tr>
<td>${i+1}</td>
<td>${u.nama}</td>
<td>${u.email}</td>
<td><img src="${u.foto}" class="photo"></td>
<td>${u.role}</td>
<td>
<button onclick="editUser(${i})">Edit</button>
<button onclick="deleteUser(${i})">Hapus</button>
</td>
</tr>
`;

});

document.getElementById("totalUser").innerText=users.length;
document.getElementById("totalFoto").innerText=users.length;

localStorage.setItem("users",JSON.stringify(users));

}

function deleteUser(i){

if(confirm("Hapus user?")){
users.splice(i,1);
renderTable();
}

}

function editUser(i){

const nama=prompt("Nama baru",users[i].nama);
const email=prompt("Email baru",users[i].email);

if(nama && email){
users[i].nama=nama;
users[i].email=email;
renderTable();
}

}

renderTable();

</script>
