<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>
<link rel="stylesheet" href="../style.css">
</head>
<body>

<div class="header">
<h2>GLOBAL ADMIN</h2>
<button class="logout" id="logoutBtn">Logout</button>
</div>

<div class="sidebar">
<h3>Menu</h3>
<a href="#">Dashboard</a>
<a href="#">Data</a>
<a href="#">Users</a>
<a href="#">Settings</a>
</div>

<div class="main">
<div class="card"><h2>Selamat Datang Admin</h2></div>

<div class="card">
<h3>Daftar User Terdaftar</h3>
<table id="userTable">
<thead>
<tr><th>Foto Profil</th><th>Username</th><th>Password</th></tr>
</thead>
<tbody></tbody>
</table>
</div>
</div>

<script>
const loggedIn = localStorage.getItem("adminLoggedIn");
if(!loggedIn){ alert("Silahkan login admin!"); window.location.href="login.html"; }

document.getElementById("logoutBtn").addEventListener("click",function(){
    localStorage.removeItem("adminLoggedIn");
    alert("Logout berhasil!"); window.location.href="login.html";
});

const users = JSON.parse(localStorage.getItem("users") || "[]");
const tbody = document.querySelector("#userTable tbody");
users.forEach(u=>{
    const tr=document.createElement("tr");
    tr.innerHTML=`<td><img src="${u.profile}" alt="Profil"></td><td>${u.username}</td><td>${u.password}</td>`;
    tbody.appendChild(tr);
});
</script>
</body>
</html>
