<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<style>
body{margin:0;font-family:Arial;background:#f4f4f4;color:#333;display:flex;}
.sidebar{width:220px;background:#2c3e50;color:#fff;display:flex;flex-direction:column;padding:20px;align-items:center;}
.sidebar img{width:80px;height:80px;border-radius:50%;margin-bottom:15px;border:2px solid #2980b9;}
.sidebar h2{text-align:center;margin-bottom:20px;}
.sidebar a{color:#fff;text-decoration:none;padding:10px;display:block;margin-bottom:5px;border-radius:5px;}
.sidebar a:hover{background:#34495e;}

.main{flex:1;padding:20px;position:relative;}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.header h1{color:#2c3e50;}

.logout-btn{
padding:5px 15px;
border:none;
border-radius:5px;
background:#e74c3c;
color:white;
cursor:pointer;
}

.toggle-btn{
padding:5px 10px;
border:none;
border-radius:5px;
background:#2980b9;
color:white;
cursor:pointer;
}

.cards{
display:flex;
gap:20px;
margin-bottom:20px;
flex-wrap:wrap;
}

.card{
flex:1;
min-width:150px;
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.card h3{
margin-bottom:10px;
color:#2980b9;
}

.table-container{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

table{
width:100%;
border-collapse:collapse;
}

table th, table td{
padding:10px;
text-align:left;
border-bottom:1px solid #ddd;
}

table th{
background:#2980b9;
color:white;
}

.photo{
width:40px;
height:40px;
border-radius:50%;
object-fit:cover;
}

button{
padding:5px 10px;
border:none;
border-radius:5px;
background:#2980b9;
color:white;
cursor:pointer;
margin-right:5px;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
padding:20px;
border-radius:10px;
width:90%;
max-width:400px;
position:relative;
}

.close{
position:absolute;
top:10px;
right:15px;
font-size:20px;
cursor:pointer;
}

.modal-content input, .modal-content select{
width:100%;
padding:8px;
margin-top:5px;
margin-bottom:10px;
border-radius:5px;
border:1px solid #ccc;
}
</style>
</head>

<body>

<div class="sidebar">
<img src="https://via.placeholder.com/80?text=Admin">
<h2>Admin Panel</h2>
<a href="#">Dashboard</a>
<a href="#">Data User</a>
<a href="#">Foto</a>
</div>

<div class="main">

<div class="header">
<h1>Dashboard</h1>
<div>
<button class="toggle-btn" onclick="toggleTheme()">Dark/Light</button>
<button class="logout-btn" onclick="logout()">Logout</button>
</div>
</div>

<div class="cards">

<div class="card">
<h3>Total User</h3>
<p id="totalUser">0</p>
</div>

<div class="card">
<h3>Total Foto</h3>
<p id="totalFoto">0</p>
</div>

</div>

<div class="table-container">

<button id="addUserBtn">Tambah User</button>

<table>
<thead>
<tr>
<th>No</th>
<th>Username</th>
<th>Nama</th>
<th>Email</th>
<th>Foto</th>
<th>Role</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="userTableBody"></tbody>

</table>

</div>

</div>

<div class="modal" id="userModal">
<div class="modal-content">

<span class="close" onclick="closeModal()">&times;</span>

<h3 id="modalTitle">Tambah User</h3>

<form id="userForm">

<label>Username</label>
<input type="text" name="username" required>

<label>Nama</label>
<input type="text" name="nama" required>

<label>Email</label>
<input type="email" name="email" required>

<label>Role</label>
<select name="role">
<option value="User">User</option>
<option value="Admin">Admin</option>
</select>

<label>Password</label>
<input type="text" name="password">

<label>Foto (URL)</label>
<input type="text" name="foto">

<button type="submit">Simpan</button>

</form>

</div>
</div>

<script>

// cek admin login
if(localStorage.getItem("adminLoggedIn")!=="true"){
window.location.href="login.html";
}

// data users
let users=JSON.parse(localStorage.getItem("users")||"[]");

let editIndex=null;

// render table
function renderTable(){

const body=document.getElementById("userTableBody");
body.innerHTML="";

users.forEach((u,i)=>{

body.innerHTML+=`
<tr>
<td>${i+1}</td>
<td>${u.username}</td>
<td>${u.nama}</td>
<td>${u.email}</td>
<td><img src="${u.foto}" class="photo"></td>
<td>${u.role}</td>
<td>
<button onclick="editUser(${i})">Edit</button>
<button onclick="deleteUser(${i})">Hapus</button>
</td>
</tr>
`;

});

document.getElementById("totalUser").innerText=users.length;
document.getElementById("totalFoto").innerText=users.filter(u=>u.foto).length;

localStorage.setItem("users",JSON.stringify(users));

}

// tambah user
document.getElementById("addUserBtn").onclick=function(){
editIndex=null;
document.getElementById("modalTitle").innerText="Tambah User";
document.getElementById("userForm").reset();
document.getElementById("userModal").style.display="flex";
}

// close modal
function closeModal(){
document.getElementById("userModal").style.display="none";
}

// submit form
document.getElementById("userForm").onsubmit=function(e){

e.preventDefault();

const form=new FormData(this);

const newUser={
username:form.get("username"),
nama:form.get("nama"),
email:form.get("email"),
role:form.get("role"),
password:form.get("password"),
foto:form.get("foto")
};

if(editIndex!==null){
users[editIndex]=newUser;
}else{
users.push(newUser);
}

renderTable();
closeModal();

}

// edit
function editUser(i){

editIndex=i;

const u=users[i];

document.getElementById("modalTitle").innerText="Edit User";

const form=document.getElementById("userForm");

form.username.value=u.username;
form.nama.value=u.nama;
form.email.value=u.email;
form.role.value=u.role;
form.password.value=u.password;
form.foto.value=u.foto;

document.getElementById("userModal").style.display="flex";

}

// hapus
function deleteUser(i){

if(confirm("Hapus user ini?")){
users.splice(i,1);
renderTable();
}

}

// logout
function logout(){
localStorage.removeItem("adminLoggedIn");
window.location.href="login.html";
}

// theme
function toggleTheme(){
document.body.style.background=
document.body.style.background=="#fff" ? "#f4f4f4" : "#fff";
}

// load
renderTable();

</script>

</body>
  </html>
