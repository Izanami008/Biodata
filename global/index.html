<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            background: black;
            color: white;
            font-family: Arial;
            text-align: center;
        }

        #loading {
            position: absolute;
            top: 40%;
            width: 100%;
        }

        .loader {
            border: 5px solid #222;
            border-top: 5px solid #00ffcc;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            margin: auto;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        video {
            width: 100%;
            height: 100vh;
            object-fit: cover;
            display: none;
        }
    </style>
</head>
