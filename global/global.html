<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global System</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: black;
            color: white;
            text-align: center;
        }

        header {
            background: #111;
            padding: 15px;
            font-size: 20px;
            font-weight: bold;
            border-bottom: 1px solid #333;
        }

        .container {
            padding: 20px;
        }

        video {
            width: 90%;
            max-width: 500px;
            border-radius: 10px;
            margin-top: 20px;
        }

        .box {
            background: #111;
            padding: 20px;
            margin-top: 20px;
            border-radius: 10px;
            border: 1px solid #333;
        }

        .btn {
            margin-top: 20px;
            padding: 10px 20px;
            background: #00ffcc;
            color: black;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .btn:hover {
            background: #00ccaa;
        }

        footer {
            margin-top: 40px;
            padding: 15px;
            background: #111;
            border-top: 1px solid #333;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <header>
        GLOBAL SYSTEM
    </header>

    <div class="container">

        <h2>Selamat Datang</h2>
        <p>Sistem global telah aktif.</p>

        <video controls autoplay muted loop>
            <source src="video.mp4" type="video/mp4">
            Browser tidak mendukung video.
        </video>

        <div class="box">
            <h3>Status Sistem</h3>
            <p>Data perangkat berhasil diproses.</p>
            <p>Server berjalan normal.</p>
        </div>

        <button class="btn" onclick="goHome()">
            Kembali ke Biodata
        </button>

    </div>

    <footer>
        © 2026 Global System
    </footer>

    <script>
        function goHome() {
            window.location.href = "../index.html";
        }
    </script>

</body>

</html>
