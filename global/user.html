<!DOCTYPE html>
<html>
<head>
<title>User</title>
<style>
body{background:#0f172a;color:white;font-family:Arial;text-align:center;padding-top:50px;}
img{width:100px;height:100px;border-radius:50%;}
button{padding:10px 20px;background:red;color:white;border:none;border-radius:5px;margin-top:20px;}
</style>
</head>

<body>

<img id="foto">

<h2 id="nama"></h2>

<p id="email"></p>

<button onclick="logout()">Logout</button>

<script>

const user=JSON.parse(localStorage.getItem("currentUser"));

if(!user){
window.location.href="login.html";
}

document.getElementById("foto").src=user.foto;
document.getElementById("nama").innerText=user.nama;
document.getElementById("email").innerText=user.email;

function logout(){
localStorage.removeItem("currentUser");
window.location.href="login.html";
}

</script>

</body>
</html>
