<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}
body{background:black;color:white;overflow-x:hidden;}

/* HEADER */
header{
position:fixed;top:0;left:0;width:100%;

/* MENU */
.settings-menu{

.menu-btn{color:white;text-decoration:none;padding:8px;border-radius:6px;transition:.3s;}

/* VIDEO */

.video-section h1{font-size:2.3rem;margin-bottom:30px;}
.video-section span{color:#b74b4b;}

.video-container{

}
.service-video{
width:100%;z-index:2;position:relative;
object-fit:cover;pointer-events:none;background:black;
}
#three-canvas{
position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;
}

/* CARD */
.service-info{
margin-top:40px;display:flex;justify-content:center;
flex-wrap:wrap;gap:20px;padding-bottom:50px;
}
.card{
background:#111;padding:20px;width:250px;
border-radius:12px;border:1px solid #222;
transition:.3s;text-align:center;
}
.card:hover{
transform:translateY(-5px);
box-shadow:0 0 20px rgba(183,75,75,0.4);
}
.card i{font-size:30px;color:#b74b4b;margin-bottom:10px;}
.card h3{margin-bottom:10px;}
.card p{color:#aaa;margin-bottom:10px;}

.card a{

/* SATURN */
.saturn-box{
width:100%;
height:150px;
margin-top:15px;
border-radius:10px;
overflow:hidden;
background:black;
}
#saturn-canvas{width:100%;height:100%;display:block;}

/* LIGHT MODE */
.light-mode{background:white;color:black;}
.light-mode header{background:white;}
.light-mode .card{background:#eee;color:black;}

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

/* MENU */
function toggleMenu(){
document.getElementById("settingsMenu").classList.toggle("show");
}
function toggleTheme(){
document.body.classList.toggle("light-mode");
}
window.onclick=function(e){
if(!e.target.closest('.logo-area')){
document.getElementById("settingsMenu").classList.remove("show");
}
}

/* MAIN THREE */
const container=document.getElementById("videoContainer");
const canvas=document.getElementById("three-canvas");

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(75,container.clientWidth/container.clientHeight,0.1,1000);
const renderer=new THREE.WebGLRenderer({canvas:canvas,alpha:true});

renderer.setSize(container.clientWidth,container.clientHeight);
camera.position.z=5;

/* PARTICLES */
const geo=new THREE.BufferGeometry();
const arr=new Float32Array(800*3);
for(let i=0;i<arr.length;i++){arr[i]=(Math.random()-0.5)*10;}
geo.setAttribute('position',new THREE.BufferAttribute(arr,3));

const mat=new THREE.PointsMaterial({size:0.02,color:0xffffff});
const particles=new THREE.Points(geo,mat);
scene.add(particles);

/* PLANET */
const planet=new THREE.Mesh(
new THREE.SphereGeometry(1,64,64),
new THREE.MeshStandardMaterial({color:0x2266ff})
);
scene.add(planet);

/* LIGHT */
scene.add(new THREE.PointLight(0xffffff,1).position.set(5,5,5));
scene.add(new THREE.AmbientLight(0xffffff,0.4));

function animate(){
requestAnimationFrame(animate);
particles.rotation.y+=0.0008;
planet.rotation.y+=0.003;
renderer.render(scene,camera);
}
animate();

/* SATURN */
const saturnCanvas=document.getElementById("saturn-canvas");
if(saturnCanvas){
const sScene=new THREE.Scene();
const sCam=new THREE.PerspectiveCamera(60,1,0.1,1000);
const sRenderer=new THREE.WebGLRenderer({canvas:saturnCanvas,alpha:true});

sRenderer.setSize(saturnCanvas.clientWidth,saturnCanvas.clientHeight);
sCam.position.z=3;

const saturn=new THREE.Mesh(
new THREE.SphereGeometry(0.6,64,64),
new THREE.MeshStandardMaterial({color:0xd2b48c})
);

const ring=new THREE.Mesh(
new THREE.RingGeometry(0.8,1.2,64),
new THREE.MeshBasicMaterial({color:0xf5deb3,side:THREE.DoubleSide})
);

ring.rotation.x=Math.PI/2;
saturn.add(ring);
sScene.add(saturn);

sScene.add(new THREE.PointLight(0xffffff,1).position.set(5,5,5));
sScene.add(new THREE.AmbientLight(0xffffff,0.4));

function saturnAnim(){
requestAnimationFrame(saturnAnim);
saturn.rotation.y+=0.01;
ring.rotation.z+=0.005;
sRenderer.render(sScene,sCam);
}
saturnAnim();
}

</script>
