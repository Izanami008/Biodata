<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Services - Erika099</title>
<style>
  html, body {
    margin:0; padding:0;
    height:100%;
    overflow-x:hidden;
    background:#000;
    font-family:sans-serif;
  }

  /* HEADER */
  header {
    position: fixed;
    width: 100%;
    z-index: 10;
    background: rgba(0,0,0,0.7);
    display:flex;
    flex-direction: column;
    align-items: flex-start;
    padding:10px 20px;
  }

  /* LOGO */
  .logo-container {
    display:flex;
    align-items:center;
    gap:10px;
    cursor:pointer;
    transition: all 0.3s ease;
  }
  .logo-container:hover {
    transform: scale(1.05);
    filter: drop-shadow(0 0 10px red);
  }
  .logo-container img { width:40px; height:auto; }
  .logo-container span {
    color:red;
    font-weight:bold;
    font-size:1.6rem;
    text-decoration:none;
  }

  /* NAV LINKS */
  nav {
    display:flex;
    flex-wrap: wrap;
    gap:10px;
    margin-top:5px;
    overflow:hidden;
    width:100%;
    max-height:0;
    transition: max-height 0.5s ease, opacity 0.5s ease;
    opacity:0;
  }
  nav a {
    color:red;
    text-decoration:none;
    font-size:1.1rem;
    padding:8px 15px;
    border:2px solid red;
    border-radius:10px;
    transition: all 0.3s ease;
    white-space: nowrap;
  }
  nav a:hover {
    background:red; color:#fff; transform:scale(1.05);
  }
  nav a.active { background:red; color:#fff; }

  nav.expanded {
    max-height:500px;
    opacity:1;
  }

  /* VIDEO CONTAINER */
  .video-container {
    position: relative;
    width: 100%;
    padding-top: 56.25%; /* 16:9 */
    margin-top:80px; /* jarak awal dari header */
    z-index:1;
    overflow:hidden;
    border-radius:10px;
    transition: margin-top 0.5s ease; /* animasi geser */
  }

  .video-container video {
    position:absolute;
    top:0; left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    pointer-events:none;
  }

  /* PARTIKEL OVERLAY */
  .video-overlay {
    position:absolute;
    top:0; left:0;
    width:100%; height:100%;
    pointer-events:none;
    z-index:2;
  }

  /* CANVAS */
  canvas { position:absolute; top:0; left:0; z-index:0; width:100%; height:100%; }

  @media(max-width:600px){
    .logo-container span { font-size:1.4rem; }
    .logo-container img { width:30px; }
    nav a { font-size:1rem; padding:6px 12px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-container" id="logoMenu">
    <img src="../img/logo.png" alt="Logo Erika">
    <span>Erika099</span>
  </div>
  <nav id="mainNav">
    <a href="../index.html">Home</a>
    <a href="services.html" class="active">Services</a>
    <a href="skills.html">Skills</a>
    <a href="education.html">Education</a>
    <a href="experience.html">Experience</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<!-- Video background 16:9 tanpa kontrol -->
<div class="video-container" id="videoContainer">
  <video src="../vidio/service01.mp4" autoplay muted loop playsinline></video>
  <canvas class="video-overlay" id="videoOverlay"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.min.js"></script>
<script>
  const logoMenu = document.getElementById('logoMenu');
  const mainNav = document.getElementById('mainNav');
  const videoContainer = document.getElementById('videoContainer');

  // Toggle menu & geser video
  logoMenu.addEventListener('click', ()=>{
    mainNav.classList.toggle('expanded');
    if(mainNav.classList.contains('expanded')){
      videoContainer.style.marginTop = '180px'; // video turun saat menu muncul
    } else {
      videoContainer.style.marginTop = '80px'; // posisi awal
    }
  });

  // Scene + Camera + Renderer
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 100);
  camera.position.z = 5;

  const renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x000000,0);
  document.body.appendChild(renderer.domElement);

  const particleCount = 1500;
  const radius = 2;
  const thickness = 0.5;
  const positions = [], colors = [];

  for(let i=0;i<particleCount;i++){
    const angle = (i/particleCount)*Math.PI*2;
    const r = radius + (Math.random()-0.5)*thickness;
    const x = Math.cos(angle)*r;
    const y = (Math.random()-0.5)*thickness;
    const z = Math.sin(angle)*r;
    positions.push(x,y,z);

    const hue = 0.1 + (i/particleCount)*0.3;
    const color = new THREE.Color().setHSL(hue,1,0.6);
    colors.push(color.r,color.g,color.b);
  }

  const geometry = new THREE.BufferGeometry();
  geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions,3));
  geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors,3));

  const material = new THREE.PointsMaterial({
    vertexColors:true,
    size:0.25,
    sizeAttenuation:true
  });

  const particles = new THREE.Points(geometry, material);
  scene.add(particles);

  function animate(){
    requestAnimationFrame(animate);
    particles.rotation.y += 0.003;
    particles.rotation.x += 0.0005;
    renderer.render(scene,camera);
  }
  animate();

  window.addEventListener('resize', ()=>{
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // Overlay partikel di video
  const overlayCanvas = document.getElementById('videoOverlay');
  const overlayRenderer = new THREE.WebGLRenderer({canvas:overlayCanvas, alpha:true});
  overlayRenderer.setSize(window.innerWidth, window.innerHeight);

  const overlayScene = new THREE.Scene();
  const overlayCamera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 100);
  overlayCamera.position.z = 5;

  const overlayParticles = new THREE.Points(geometry, material);
  overlayScene.add(overlayParticles);

  function overlayAnimate(){
    requestAnimationFrame(overlayAnimate);
    overlayParticles.rotation.y += 0.002;
    overlayParticles.rotation.x += 0.0005;
    overlayRenderer.render(overlayScene, overlayCamera);
  }
  overlayAnimate();
</script>

</body>
</html>
