<!-- THREE JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

/* MENU */
function toggleMenu(){
document.getElementById("settingsMenu").classList.toggle("show");
}

function toggleTheme(){
document.body.classList.toggle("light-mode");
}

/* MAIN SCENE */
const container=document.getElementById("videoContainer");
const canvas=document.getElementById("three-canvas");

const scene=new THREE.Scene();

const camera=new THREE.PerspectiveCamera(75,container.clientWidth/container.clientHeight,0.1,1000);
camera.position.z=5;

const renderer=new THREE.WebGLRenderer({canvas:canvas,alpha:true});
renderer.setSize(container.clientWidth,container.clientHeight);

/* PARTICLE */
const geometry=new THREE.BufferGeometry();
const count=800;
const posArray=new Float32Array(count*3);

for(let i=0;i<count*3;i++){
posArray[i]=(Math.random()-0.5)*10;
}

geometry.setAttribute('position',new THREE.BufferAttribute(posArray,3));

const particles=new THREE.Points(geometry,new THREE.PointsMaterial({size:0.02,color:0xffffff}));
scene.add(particles);

/* PLANET */
const planet=new THREE.Mesh(
new THREE.SphereGeometry(1,64,64),
new THREE.MeshStandardMaterial({color:0x2266ff})
);

scene.add(planet);

/* LIGHT */
scene.add(new THREE.PointLight(0xffffff,1).position.set(5,5,5));
scene.add(new THREE.AmbientLight(0xffffff,0.4));

function animate(){
requestAnimationFrame(animate);
particles.rotation.y+=0.0008;
planet.rotation.y+=0.003;
renderer.render(scene,camera);
}
animate();

/* RESPONSIVE */
window.addEventListener("resize",()=>{
renderer.setSize(container.clientWidth,container.clientHeight);
camera.aspect=container.clientWidth/container.clientHeight;
camera.updateProjectionMatrix();
});

/* =========================
🪐 SATURN MINI (UI DESIGN)
========================= */

const saturnCanvas=document.getElementById("saturn-mini");

const scene2=new THREE.Scene();
const camera2=new THREE.PerspectiveCamera(75,1,0.1,1000);
camera2.position.z=4;

const renderer2=new THREE.WebGLRenderer({canvas:saturnCanvas,alpha:true});
renderer2.setSize(250,180);

/* SATURN */
const saturn=new THREE.Mesh(
new THREE.SphereGeometry(1,32,32),
new THREE.MeshStandardMaterial({color:0xffaa55})
);
scene2.add(saturn);

/* RING */
const ring=new THREE.Mesh(
new THREE.RingGeometry(1.2,1.8,64),
new THREE.MeshBasicMaterial({color:0xffffff,side:THREE.DoubleSide,transparent:true,opacity:0.4})
);
ring.rotation.x=Math.PI/2;
scene2.add(ring);

/* LIGHT */
scene2.add(new THREE.AmbientLight(0xffffff,0.8));

function animate2(){
requestAnimationFrame(animate2);
saturn.rotation.y+=0.01;
ring.rotation.z+=0.005;
renderer2.render(scene2,camera2);
}
animate2();

</script>
