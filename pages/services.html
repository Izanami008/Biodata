Python Turtle Simulation
Type: spiral / galaxy / turtle
</pre>

</div>

<input id="aiInput" placeholder="spiral / galaxy / turtle">

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

/* MENU */
function toggleMenu(){
document.getElementById("settingsMenu").classList.toggle("show");
}

/* THREE */
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(75,window.innerWidth/400,0.1,1000);
const renderer=new THREE.WebGLRenderer({canvas:document.getElementById("three-canvas"),alpha:true});
renderer.setSize(window.innerWidth,400);
camera.position.z=5;

const planet=new THREE.Mesh(new THREE.SphereGeometry(1,32,32),new THREE.MeshBasicMaterial({color:0x2266ff}));
scene.add(planet);

function animate(){
requestAnimationFrame(animate);
planet.rotation.y+=0.003;
renderer.render(scene,camera);
}
animate();

/* TURTLE EXTREME */
const c=document.getElementById("codeCanvas");
const ctx=c.getContext("2d");
c.width=350;c.height=350;

let x,y,angle,h,i,j,running=true,speed=5,mode="turtle";

function init(){
x=175;y=175;angle=0;h=0;i=0;j=0;
ctx.clearRect(0,0,350,350);
}
init();

function toggleRun(){running=!running;}
function resetTurtle(){init();}
document.getElementById("speedControl").oninput=e=>speed=e.target.value;

function generateAI(){
let v=document.getElementById("aiInput").value;
if(v.includes("spiral"))mode="spiral";
else if(v.includes("galaxy"))mode="galaxy";
else mode="turtle";
init();
}

function saveImage(){
let link=document.createElement("a");
link.download="art.png";
link.href=c.toDataURL();
link.click();
}

function fullscreenCanvas(){c.requestFullscreen();}

function draw(){

if(running){

for(let s=0;s<speed;s++){

ctx.strokeStyle=`hsl(${h*200},100%,50%)`;
ctx.beginPath();
ctx.moveTo(x,y);

if(mode==="turtle"){
let r=150-j*6;
angle+=Math.PI/2;
x+=Math.cos(angle)*r*0.1;
y+=Math.sin(angle)*r*0.1;
angle-=Math.PI/2;
x+=Math.cos(angle)*r*0.1;
y+=Math.sin(angle)*r*0.1;
angle+=Math.PI;
x+=Math.cos(angle)*4;
y+=Math.sin(angle)*4;
}
else if(mode==="spiral"){
angle+=0.2;
let r=j*0.5;
x+=Math.cos(angle)*r;
y+=Math.sin(angle)*r;
}
else{
let a=j*0.3;
let r=j*0.5;
x=175+Math.cos(a)*r;
y=175+Math.sin(a)*r;
}

ctx.lineTo(x,y);
ctx.stroke();

h+=0.01;j++;
if(j>300)init();

}

}

requestAnimationFrame(draw);
}
draw();

</script>
