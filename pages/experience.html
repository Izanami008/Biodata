<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Experience - Bismarck</title>
  <link rel="stylesheet" href="../style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background-color: #000;
      font-family: sans-serif;
    }
    header {
      position: fixed;
      width: 100%;
      z-index: 10;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      padding: 0 20px;
      height: 60px;
    }
    nav a {
      margin-left: 20px;
      color: #fff;
      text-decoration: none;
    }
    nav a.active {
      text-decoration: underline;
    }
    canvas {
      display: block;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 0; /* pastikan canvas dibawah header */
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <header>
    <a href="../index.html" class="logo">Bismarck</a>
    <nav>
      <a href="../index.html">Home</a>
      <a href="services.html">Services</a>
      <a href="skills.html">Skills</a>
      <a href="education.html">Education</a>
      <a href="experience.html" class="active">Experience</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <script src="https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.min.js"></script>
  <script>
    // --- Scene, camera, renderer ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 5;

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // --- Partikel Jupiter ---
    const particleCount = 2000;
    const radius = 2;
    const thickness = 0.5;
    const positions = [];
    const colors = [];
    const sizes = [];

    for (let j = 0; j < particleCount; j++) {
      const angle = (j / particleCount) * Math.PI * 2;
      const radiusVariation = radius + (Math.random() - 0.5) * thickness;

      const x = Math.cos(angle) * radiusVariation;
      const y = (Math.random() - 0.5) * thickness;
      const z = Math.sin(angle) * radiusVariation;

      positions.push(x, y, z);

      const hue = (j / particleCount) * 0.3 + 0.7;
      const color = new THREE.Color().setHSL(hue, 1, 0.6);
      color.multiplyScalar(1.2);
      colors.push(color.r, color.g, color.b);

      sizes.push(Math.random() * 0.12 + 0.06);
    }

    const geometry = new THREE.BufferGeometry();
    geometry.setAttribute("position", new THREE.Float32BufferAttribute(positions, 3));
    geometry.setAttribute("color", new THREE.Float32BufferAttribute(colors, 3));
    geometry.setAttribute("size", new THREE.Float32BufferAttribute(sizes, 1));

    const material = new THREE.PointsMaterial({
      vertexColors: true,
      size: 0.05,
      sizeAttenuation: true,
    });

    const particles = new THREE.Points(geometry, material);
    scene.add(particles);

    // --- Animasi rotasi ---
    function animate() {
      requestAnimationFrame(animate);
      particles.rotation.y += 0.002;
      particles.rotation.x += 0.0005;
      renderer.render(scene, camera);
    }
    animate();

    // --- Resize handling ---
    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
