<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anime Fight Combo</title>

<style>
body{margin:0;overflow:hidden;background:black;font-family:sans-serif;}

.ui{
position:absolute;top:10px;width:100%;
display:flex;justify-content:space-between;
padding:0 20px;color:white;
}

.bar{width:200px;height:15px;background:#222;border:1px solid #00ff9d;}
.hp{height:100%;background:red;}
.energy{height:100%;background:#00ff9d;}

.controls{
position:fixed;bottom:20px;width:100%;
display:flex;justify-content:space-between;padding:0 20px;
}

#analog{
width:120px;height:120px;
background:rgba(255,255,255,0.1);
border-radius:50%;position:relative;
}

#stick{
width:50px;height:50px;background:#00ff9d;
border-radius:50%;position:absolute;
top:35px;left:35px;
}

.buttons{display:flex;gap:15px;}

button{
width:75px;height:75px;border-radius:50%;
border:none;color:white;font-size:18px;
}

#skill1{background:linear-gradient(#00c3ff,#005eff);}
#skill2{background:linear-gradient(#ff9d00,#ff3c00);}
#skill3{background:linear-gradient(#ff0000,#990000);}
</style>
</head>

<body>

<canvas id="gameCanvas"></canvas>

<div class="ui">
<div>PLAYER<div class="bar"><div id="playerHP" class="hp"></div></div></div>
<div>ENEMY<div class="bar"><div id="enemyHP" class="hp"></div></div></div>
<div>ENERGY<div class="bar"><div id="energyBar" class="energy"></div></div></div>
</div>

<div class="controls">

<div id="analog"><div id="stick"></div></div>

<div class="buttons">
<button id="skill1">⚔️</button>
<button id="skill2">⚡</button>
<button id="skill3">💥</button>
</div>

</div>

<script>

// ===== CANVAS =====
const canvas=document.getElementById("gameCanvas");
const ctx=canvas.getContext("2d");

const dpr=window.devicePixelRatio||1;
canvas.width=innerWidth*dpr;
canvas.height=innerHeight*dpr;
canvas.style.width=innerWidth+"px";
canvas.style.height=innerHeight+"px";
ctx.scale(dpr,dpr);

// ===== SPRITE =====
const playerImg=new Image();
playerImg.src="png/character.png";

const frameW=333, frameH=333;
let frameX=0, frameY=0, frameSpeed=0;
let facing=1;

// ===== PLAYER =====
let player={x:100,y:300,w:150,h:150,hp:100,energy:0};

// ===== ENEMY =====
let enemy={x:600,y:300,w:120,h:120,hp:100,speed:1.5};

// ===== CONTROL =====
let moveX=0, moveY=0;

// ===== COMBO =====
let comboStep=0;
let comboTimer=0;

// ===== SKILL =====
let skill2=false;
let ultiMode=false, ultiTimer=0;

// ===== ANALOG =====
const analog=document.getElementById("analog");
const stick=document.getElementById("stick");

analog.addEventListener("touchmove",(e)=>{
let rect=analog.getBoundingClientRect();
let x=e.touches[0].clientX-rect.left-60;
let y=e.touches[0].clientY-rect.top-60;

let dist=Math.sqrt(x*x+y*y);
let max=40;

if(dist>max){
x=x/dist*max;
y=y/dist*max;
}

stick.style.left=(x+60-25)+"px";
stick.style.top=(y+60-25)+"px";

moveX=x/max;
moveY=y/max;
});

analog.addEventListener("touchend",()=>{
moveX=0;moveY=0;
stick.style.left="35px";
stick.style.top="35px";
});

// ===== BUTTON =====
skill1.onclick=()=>{
comboStep++;
comboTimer=20;
if(comboStep>3) comboStep=1;
};

skill2.onclick=()=>{
skill2=true;
setTimeout(()=>skill2=false,400);
};

skill3.onclick=()=>{
if(player.energy>=100){
ultiMode=true;
ultiTimer=0;
player.energy=0;
}
};

// ===== GAME LOOP =====
function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

// BACKGROUND
let grad=ctx.createLinearGradient(0,0,0,canvas.height);
grad.addColorStop(0,"#001a12");
grad.addColorStop(1,"black");
ctx.fillStyle=grad;
ctx.fillRect(0,0,canvas.width,canvas.height);

// lantai
ctx.fillStyle="#111";
ctx.fillRect(0,420,canvas.width,200);

// MOVE
player.x+=moveX*5;
player.y+=moveY*5;

// arah
if(moveX>0.1) facing=1;
if(moveX<-0.1) facing=-1;

// DIST
let dx=player.x-enemy.x;
let dy=player.y-enemy.y;
let dist=Math.sqrt(dx*dx+dy*dy);

// AI
if(dist>80){
enemy.x+=dx/dist*enemy.speed;
enemy.y+=dy/dist*enemy.speed;
}

// ENEMY ATTACK
if(dist<70){
player.hp-=0.1;
}

// ===== COMBO TIMER =====
if(comboTimer>0){
comboTimer--;
}else{
comboStep=0;
}

// ===== ANIMASI =====
let moving=Math.abs(moveX)>0.1||Math.abs(moveY)>0.1;

if(comboStep===1) frameY=2;
else if(comboStep===2) frameY=3;
else if(comboStep===3) frameY=4;
else if(moving) frameY=1;
else frameY=0;

// FRAME
frameSpeed++;
if(frameSpeed>6){
frameX++;
frameSpeed=0;
if(frameX>=4) frameX=0;
}

// ===== DAMAGE COMBO =====
if(comboStep===1 && dist<100) enemy.hp-=0.5;
if(comboStep===2 && dist<100) enemy.hp-=0.8;
if(comboStep===3 && dist<120){
enemy.hp-=2;

// efek finisher
ctx.fillStyle="orange";
ctx.beginPath();
ctx.arc(enemy.x+40,enemy.y+60,40,0,Math.PI*2);
ctx.fill();
}

// ===== SKILL 2 =====
if(skill2){
ctx.fillStyle="#00ffff";
ctx.beginPath();
ctx.arc(player.x+50,player.y+60,30,0,Math.PI*2);
ctx.fill();

if(dist<120) enemy.hp-=0.5;
}

// ===== ULTIMATE =====
if(ultiMode){
ultiTimer++;

ctx.fillStyle="black";
ctx.fillRect(0,0,canvas.width,canvas.height);

let size=ultiTimer*20;

let grad=ctx.createRadialGradient(
canvas.width/2,canvas.height/2,50,
canvas.width/2,canvas.height/2,size
);

grad.addColorStop(0,"#00ffff");
grad.addColorStop(1,"transparent");

ctx.fillStyle=grad;
ctx.beginPath();
ctx.arc(canvas.width/2,canvas.height/2,size,0,Math.PI*2);
ctx.fill();

if(ultiTimer>50){
ultiMode=false;
enemy.hp-=30;
}
}

// ===== DRAW PLAYER (FLIP) =====
ctx.save();

if(facing===-1){
ctx.translate(player.x+player.w,player.y);
ctx.scale(-1,1);
ctx.drawImage(playerImg,
frameX*frameW,frameY*frameH,
frameW,frameH,
0,0,
player.w,player.h);
}else{
ctx.drawImage(playerImg,
frameX*frameW,frameY*frameH,
frameW,frameH,
player.x,player.y,
player.w,player.h);
}

ctx.restore();

// ===== ENEMY =====
ctx.fillStyle="red";
ctx.fillRect(enemy.x,enemy.y,enemy.w,enemy.h);

// ENERGY
player.energy+=0.2;
if(player.energy>100) player.energy=100;

// UI
playerHP.style.width=player.hp+"%";
enemyHP.style.width=enemy.hp+"%";
energyBar.style.width=player.energy+"%";

// END
if(player.hp<=0){
ctx.fillStyle="red";
ctx.font="40px Arial";
ctx.fillText("YOU LOSE",200,200);
return;
}

if(enemy.hp<=0){
ctx.fillStyle="lime";
ctx.font="40px Arial";
ctx.fillText("YOU WIN",200,200);
return;
}

requestAnimationFrame(draw);
}

draw();

</script>

</body>
  </html>
