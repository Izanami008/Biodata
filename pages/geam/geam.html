<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anime Fight Game</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
}

/* UI */
.ui{
position:absolute;
top:10px;
width:100%;
display:flex;
justify-content:space-between;
padding:0 20px;
color:white;
font-family:sans-serif;
}

.bar{
width:200px;
height:15px;
background:#222;
border:1px solid #0f0;
}

.hp{
height:100%;
background:red;
}

.energy{
height:100%;
background:#00ff9d;
}

/* CONTROLS */
.controls{
position:fixed;
bottom:20px;
width:100%;
display:flex;
justify-content:space-between;
padding:0 20px;
}

#analog{
width:120px;
height:120px;
background:rgba(255,255,255,0.1);
border-radius:50%;
position:relative;
}

#stick{
width:50px;
height:50px;
background:#00ff9d;
border-radius:50%;
position:absolute;
top:35px;
left:35px;
}

.buttons{
display:flex;
gap:10px;
}

button{
width:70px;
height:70px;
border-radius:50%;
border:none;
font-size:20px;
background:#111;
color:white;
}

</style>
</head>

<body>

<canvas id="gameCanvas"></canvas>

<div class="ui">
<div>
PLAYER
<div class="bar"><div id="playerHP" class="hp"></div></div>
</div>

<div>
ENEMY
<div class="bar"><div id="enemyHP" class="hp"></div></div>
</div>

<div>
ENERGY
<div class="bar"><div id="energyBar" class="energy"></div></div>
</div>
</div>

<div class="controls">

<div id="analog">
<div id="stick"></div>
</div>

<div class="buttons">
<button id="atkBtn">⚔️</button>
<button id="skillBtn">⚡</button>
<button id="ultiBtn">💥</button>
</div>

</div>

<script>

// ===== CANVAS HD =====
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const dpr = window.devicePixelRatio || 1;
canvas.width = window.innerWidth * dpr;
canvas.height = window.innerHeight * dpr;
canvas.style.width = window.innerWidth+"px";
canvas.style.height = window.innerHeight+"px";
ctx.scale(dpr,dpr);

ctx.imageSmoothingEnabled = false;

// ===== PLAYER =====
let player = {
x:100,y:200,w:200,h:200,
hp:100,energy:0
};

let attack=false;
let skill=false;

// ===== ENEMY =====
let enemy = {
x:600,y:200,w:200,h:200,
hp:100,speed:2
};

// ===== ULTIMATE =====
let ultiMode=false;
let ultiTimer=0;

// ===== ANALOG =====
let moveX=0, moveY=0;

const analog=document.getElementById("analog");
const stick=document.getElementById("stick");

analog.addEventListener("touchmove",(e)=>{
let rect=analog.getBoundingClientRect();

let x=e.touches[0].clientX-rect.left-60;
let y=e.touches[0].clientY-rect.top-60;

let dist=Math.sqrt(x*x+y*y);
let max=40;

if(dist>max){
x=x/dist*max;
y=y/dist*max;
}

stick.style.left=(x+60-25)+"px";
stick.style.top=(y+60-25)+"px";

moveX=x/max;
moveY=y/max;
});

analog.addEventListener("touchend",()=>{
moveX=0; moveY=0;
stick.style.left="35px";
stick.style.top="35px";
});

// ===== BUTTON =====
atkBtn.onclick=()=>{
attack=true;
setTimeout(()=>attack=false,300);
};

skillBtn.onclick=()=>{
skill=true;
setTimeout(()=>skill=false,300);
};

ultiBtn.onclick=()=>{
if(player.energy>=100){
ultiMode=true;
ultiTimer=0;
player.energy=0;
}
};

// ===== GAME LOOP =====
function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

// MOVE
player.x += moveX*5;
player.y += moveY*5;

// DIST
let dx=player.x-enemy.x;
let dy=player.y-enemy.y;
let dist=Math.sqrt(dx*dx+dy*dy);

// AI
if(dist>80){
enemy.x += dx/dist*enemy.speed;
enemy.y += dy/dist*enemy.speed;
}

// ENEMY ATTACK
if(dist<90){
player.hp -= 0.1;
}

// PLAYER ATTACK
if(attack && dist<100){
enemy.hp -= 1;
}

// SKILL
if(skill){
ctx.fillStyle="#00ffff";
ctx.beginPath();
ctx.arc(player.x+100,player.y+100,30,0,Math.PI*2);
ctx.fill();

if(dist<120){
enemy.hp -= 0.5;
}
}

// ULTIMATE
if(ultiMode){
ultiTimer++;

ctx.fillStyle="black";
ctx.fillRect(0,0,canvas.width,canvas.height);

let size=ultiTimer*15;

let grad=ctx.createRadialGradient(
canvas.width/2,canvas.height/2,50,
canvas.width/2,canvas.height/2,size
);

grad.addColorStop(0,"#00ffff");
grad.addColorStop(1,"transparent");

ctx.fillStyle=grad;
ctx.beginPath();
ctx.arc(canvas.width/2,canvas.height/2,size,0,Math.PI*2);
ctx.fill();

if(ultiTimer>60){
ultiMode=false;
enemy.hp -= 30;
}
}

// DRAW PLAYER
ctx.fillStyle="blue";
ctx.fillRect(player.x,player.y,player.w,player.h);

// DRAW ENEMY
ctx.fillStyle="red";
ctx.fillRect(enemy.x,enemy.y,enemy.w,enemy.h);

// ENERGY
player.energy += 0.2;
if(player.energy>100) player.energy=100;

// UI
playerHP.style.width = player.hp+"%";
enemyHP.style.width = enemy.hp+"%";
energyBar.style.width = player.energy+"%";

// GAME END
if(player.hp<=0){
ctx.fillStyle="red";
ctx.font="50px Arial";
ctx.fillText("YOU LOSE",200,200);
return;
}

if(enemy.hp<=0){
ctx.fillStyle="lime";
ctx.font="50px Arial";
ctx.fillText("YOU WIN",200,200);
return;
}

requestAnimationFrame(draw);

}

draw();

</script>

</body>
  </html>
