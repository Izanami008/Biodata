<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- ICON -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="../style.css">

    <title>Contact - Erika099</title>
</head>

<body>

<!-- HEADER -->
<header>

    <div class="logo-area">

        <img src="../img/logo.png" class="logo-img" onclick="toggleMenu()">

        <a href="../index.html" class="logo">Erika099</a>

        <!-- DROPDOWN -->
        <div class="settings-menu" id="settingsMenu">

            <a href="../index.html" class="menu-btn">Home</a>
            <a href="services.html" class="menu-btn">Services</a>
            <a href="skills.html" class="menu-btn">Skills</a>
            <a href="education.html" class="menu-btn">Education</a>
            <a href="experience.html" class="menu-btn">Experience</a>
            <a href="contact.html" class="menu-btn">Contact</a>

            <hr>

            <button class="menu-btn" onclick="toggleTheme()">
                🌙 Dark / Light
            </button>

            <a href="../global/login.html" class="menu-btn">
                Login Admin
            </a>

        </div>

    </div>

</header>

<!-- CONTACT -->
<section class="contact">

    <h1 class="title">Contact <span>Me</span></h1>

    <div class="contact-container">

        <!-- FORM -->
        <form class="contact-form" onsubmit="sendWhatsApp(event)">

            <input type="text" id="name" placeholder="Your Name" required>

            <input type="email" id="email" placeholder="Your Email" required>

            <textarea id="message" placeholder="Your Message" rows="6" required></textarea>

            <button type="submit" class="btn">Send Message</button>

        </form>

        </div>

    </div>

</section>

<!-- SCRIPT -->
<script>

/* MENU LOGO */

function toggleMenu(){

    let menu = document.getElementById("settingsMenu");

    menu.classList.toggle("show");

}

/* DARK MODE */

function toggleTheme(){

    document.body.classList.toggle("light-mode");

}

/* KLIK LUAR TUTUP MENU */

window.onclick = function(e){

    if(!e.target.closest('.logo-area')){

        let menu = document.getElementById("settingsMenu");

        if(menu.classList.contains("show")){
            menu.classList.remove("show");
        }

    }

}

/* WHATSAPP */

function sendWhatsApp(event){

    event.preventDefault();

    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let message = document.getElementById("message").value;

    let phone = "6285786468463";

    let text =
        "Halo, saya " + name + "%0A" +
        "Email: " + email + "%0A" +
        "Pesan: " + message;

    let url = "https://wa.me/" + phone + "?text=" + text;

    window.open(url, "_blank");

}

</script>

</body>
              </html>
