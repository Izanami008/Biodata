<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ICON -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<!-- CSS UTAMA -->
<link rel="stylesheet" href="../style.css">

<title>Contact - Erika099</title>

<style>

/* CONTACT PAGE */

.contact{
    padding-top:140px;
    padding-bottom:60px;
    text-align:center;
}

.title{
    font-size:2rem;
    margin-bottom:30px;
}

.title span{
    color:#b74b4b;
}

.contact-container{
    display:flex;
    justify-content:center;
}

.contact-form{
    width:400px;
    display:flex;
    flex-direction:column;
    gap:15px;
}

.contact-form input,
.contact-form textarea{
    padding:12px;
    background:#161616;
    border:none;
    border-radius:6px;
    color:white;
}

.contact-form input:focus,
.contact-form textarea:focus{
    outline:2px solid #b74b4b;
}

@media(max-width:768px){

    .contact-form{
        width:90%;
    }

}

</style>

</head>

<body>

<!-- HEADER -->
<header>

<div class="logo-area" onclick="toggleMenu()">

<img src="../img/logo.png" class="logo-img">

<div class="logo-text">
<a href="../index.html" class="logo">Erika099</a>
<p class="logo-sub">Personal Biography</p>
</div>

<!-- DROPDOWN -->
<div class="settings-menu" id="settingsMenu">

<a href="../index.html" class="menu-btn">Home</a>
<a href="services.html" class="menu-btn">Services</a>
<a href="skills.html" class="menu-btn">Skills</a>
<a href="education.html" class="menu-btn">Education</a>
<a href="experience.html" class="menu-btn">Experience</a>
<a href="contact.html" class="menu-btn">Contact</a>

<hr>

<button class="menu-btn" onclick="toggleTheme()">
🌙 Dark / Light
</button>

<a href="../global/login.html" class="menu-btn">
Login Admin
</a>

</div>

</div>

</header>

<!-- CONTACT -->
<section class="contact">

<h1 class="title">Contact <span>Me</span></h1>

<div class="contact-container">

<form class="contact-form" onsubmit="sendWhatsApp(event)">

<input type="text" id="name" placeholder="Your Name" required>

<input type="email" id="email" placeholder="Your Email" required>

<textarea id="message" placeholder="Your Message" rows="6" required></textarea>

<button type="submit" class="btn">Send Message</button>

</form>

</div>

</section>

<script>

/* MENU */
function toggleMenu(){
    document.getElementById("settingsMenu").classList.toggle("show");
}

/* DARK MODE */
function toggleTheme(){
    document.body.classList.toggle("light-mode");
}

/* KLIK LUAR */
window.onclick = function(e){
    if(!e.target.closest('.logo-area')){
        document.getElementById("settingsMenu").classList.remove("show");
    }
}

/* WHATSAPP */
function sendWhatsApp(event){

    event.preventDefault();

    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let message = document.getElementById("message").value;

    let phone = "6285786468463";

    let text =
        "Halo, saya " + name + "%0A" +
        "Email: " + email + "%0A" +
        "Pesan: " + message;

    let url = "https://wa.me/" + phone + "?text=" + text;

    window.open(url, "_blank");
}

</script>

</body>
    </html>
