<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- FONT -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<title>Skills - Erika099</title>

<style>

/* ================= RESET ================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:black;
color:white;
overflow-x:hidden;
}

/* ================= HEADER ================= */

header{
position:fixed;
top:0;
left:0;
width:100%;
padding:15px 9%;
background:black;
display:flex;
align-items:center;
z-index:1000;
}

.logo-area{
display:flex;
align-items:center;
cursor:pointer;
}

.logo-img{
width:50px;
margin-right:10px;
}

.logo{
font-size:22px;
font-weight:bold;
color:#b74b4b;
text-decoration:none;
}

.logo-sub{
font-size:12px;
color:gray;
}

/* ================= MENU ================= */

.settings-menu{
position:absolute;
top:70px;
left:9%;
background:#111;
padding:15px;
border-radius:10px;
display:none;
flex-direction:column;
gap:10px;
min-width:180px;
}

.settings-menu.show{
display:flex;
}

.menu-btn{
color:white;
text-decoration:none;
padding:8px;
border-radius:6px;
transition:0.3s;
}

.menu-btn:hover{
background:#222;
}

/* ================= SKILLS ================= */

.skills-section{
padding-top:120px;
text-align:center;
}

.skills-section h1{
font-size:2.5rem;
margin-bottom:30px;
}

.skills-container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:20px;
}

.skill-card{
background:#111;
padding:20px;
width:250px;
border-radius:12px;
border:1px solid #222;
transition:0.3s;
}

.skill-card:hover{
transform:translateY(-8px);
box-shadow:0 0 20px #b74b4b;
}

.skill-card i{
font-size:30px;
color:#b74b4b;
margin-bottom:10px;
}

.progress{
background:#222;
height:10px;
border-radius:10px;
margin-top:10px;
overflow:hidden;
}

.progress div{
height:10px;
background:#b74b4b;
}

/* ================= EARTH ================= */

.earth-section{
margin-top:50px;
text-align:center;
}

#earthCanvas{
width:100%;
height:400px;
}

/* ================= CODE EDITOR ================= */

.editor-section{
margin-top:40px;
padding:30px;
}

textarea{
width:100%;
height:120px;
background:#111;
color:white;
border:1px solid #333;
padding:10px;
margin-bottom:10px;
}

button{
background:#b74b4b;
border:none;
padding:10px 20px;
color:white;
cursor:pointer;
}

iframe{
width:100%;
height:300px;
background:white;
margin-top:20px;
}

</style>
</head>

<body>

<!-- HEADER -->

<header>

<div class="logo-area" onclick="toggleMenu()">

<img src="../img/logo.png" class="logo-img">

<div>
<a href="../index.html" class="logo">Erika099</a>
<p class="logo-sub">Personal Biography</p>
</div>

<div class="settings-menu" id="settingsMenu">

<a href="../index.html" class="menu-btn">Home</a>
<a href="services.html" class="menu-btn">Services</a>
<a href="skills.html" class="menu-btn">Skills</a>
<a href="education.html" class="menu-btn">Education</a>
<a href="experience.html" class="menu-btn">Experience</a>
<a href="contact.html" class="menu-btn">Contact</a>

</div>

</div>
</header>

<!-- SKILLS -->

<section class="skills-section">

<h1>My Skills</h1>

<div class="skills-container">

<div class="skill-card">
<i class="fa-brands fa-html5"></i>
<h3>HTML</h3>
<div class="progress"><div style="width:90%"></div></div>
</div>

<div class="skill-card">
<i class="fa-brands fa-css3-alt"></i>
<h3>CSS</h3>
<div class="progress"><div style="width:85%"></div></div>
</div>

<div class="skill-card">
<i class="fa-brands fa-js"></i>
<h3>JavaScript</h3>
<div class="progress"><div style="width:80%"></div></div>
</div>

</div>

</section>

<!-- EARTH -->

<section class="earth-section">

<h1>3D Earth</h1>

<canvas id="earthCanvas"></canvas>

</section>

<!-- CODE EDITOR -->

<section class="editor-section">

<h1>Try Coding</h1>

<textarea id="code">

<h1>Hello Erika</h1>
<p>Test Coding</p>

</textarea>

<button onclick="runCode()">Run Code</button>

<iframe id="output"></iframe>

</section>

<!-- THREE JS -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

/* MENU */

function toggleMenu(){
document.getElementById("settingsMenu").classList.toggle("show");
}

/* EARTH */

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/400,
0.1,
1000
);

const renderer = new THREE.WebGLRenderer({
canvas:document.getElementById("earthCanvas")
});

renderer.setSize(window.innerWidth,400);

const geometry = new THREE.SphereGeometry(2,32,32);

const material = new THREE.MeshBasicMaterial({
wireframe:true
});

const earth = new THREE.Mesh(geometry,material);

scene.add(earth);

camera.position.z = 5;

function animate(){
requestAnimationFrame(animate);
earth.rotation.y += 0.01;
renderer.render(scene,camera);
}

animate();

/* CODE RUN */

function runCode(){

const code =
document.getElementById("code").value;

document.getElementById("output")
srcdoc = code;

}

</script>

</body>
    </html>
