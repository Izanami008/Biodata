<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Erika099 - AI Virtual Assistant</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Poppins,sans-serif;
}

body{
  background:radial-gradient(circle at top,#0b1020,#000);
  color:white;
  min-height:100vh;
}

/* ================= HEADER ================= */

header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  padding:14px 8%;
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:rgba(0,0,0,.62);
  backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(255,255,255,.08);
  z-index:1000;
}

.logo-area{
  position:relative;
  display:flex;
  align-items:center;
  gap:12px;
}

.logo-img{
  width:44px;
  height:44px;
  object-fit:contain;
  filter:drop-shadow(0 0 10px rgba(0,255,255,.35));
}

.logo{
  display:block;
  text-decoration:none;
  font-size:20px;
  font-weight:700;
  color:#b74b4b;
  line-height:1;
}

.logo-sub{
  margin-top:4px;
  font-size:12px;
  color:#8d93a7;
}

.menu-toggle{
  background:transparent;
  border:none;
  color:white;
  cursor:pointer;
  font-size:14px;
  padding:8px 12px;
  border-radius:10px;
}

.menu-toggle:hover{
  background:rgba(255,255,255,.06);
}

.settings-menu{
  position:absolute;
  top:62px;
  left:0;
  min-width:220px;
  background:rgba(18,18,18,.96);
  border:1px solid rgba(255,255,255,.08);
  border-radius:14px;
  padding:12px;
  display:none;
  flex-direction:column;
  gap:8px;
  backdrop-filter:blur(10px);
}

.settings-menu.show{
  display:flex;
}

.menu-btn{
  background:transparent;
  color:white;
  text-decoration:none;
  border:none;
  text-align:left;
  cursor:pointer;
  padding:8px 10px;
  border-radius:8px;
}

.menu-btn:hover{
  background:rgba(255,255,255,.05);
}

/* ================= CONTENT ================= */

.container{
  padding:120px 9% 70px;
  text-align:center;
}

.hero-title{
  font-size:34px;
  font-weight:700;
  margin-bottom:12px;
}

.card{
  max-width:700px;
  margin:0 auto;
  background:rgba(255,255,255,.04);
  padding:18px 22px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,.08);
  color:#d5d7e0;
}

/* ================= VTUBER ================= */

.vtuber-box{
  margin-top:55px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:18px;
}

.vtuber-frame{
  position:relative;
  width:300px;
  height:300px;
  display:flex;
  align-items:center;
  justify-content:center;
  isolation:isolate;
}

.vtuber-frame::before{
  content:"";
  position:absolute;
  inset:-10px;
  border-radius:40px;
  background:
    radial-gradient(circle,
      rgba(255,220,120,.25) 0%,
      rgba(255,170,40,.12) 45%,
      transparent 72%);
  filter:blur(16px);
  z-index:0;
}

.vtuber-frame::after{
  content:"";
  position:absolute;
  inset:-5px;
  border-radius:36px;
  box-shadow:
    0 0 18px rgba(255,210,120,.4),
    0 0 35px rgba(255,160,30,.18);
  z-index:1;
}

.frame-img{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:contain;
  pointer-events:none;
  z-index:4;
}

#avatar{
  position:absolute;
  width:155px;
  bottom:42px;
  left:50%;
  transform:translateX(-50%);
  z-index:2;
  transition:.22s;
  filter:
    drop-shadow(0 0 12px rgba(255,220,120,.22))
    drop-shadow(0 0 20px rgba(255,140,0,.12));
}

#bubble{
  background:rgba(0,0,0,.55);
  padding:11px 16px;
  border-radius:14px;
  font-size:14px;
  max-width:360px;
  text-align:center;
  border:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(6px);
}

/* ================= AI BUTTON ================= */

.ai-btn{
  position:fixed;
  right:20px;
  bottom:20px;
  width:62px;
  height:62px;
  border-radius:50%;
  background:linear-gradient(45deg,#00ffcc,#6c5ce7);
  color:white;
  font-size:22px;
  border:none;
  cursor:pointer;
  box-shadow:0 0 20px rgba(0,255,204,.5);
  z-index:1200;
}

#aiBox{
  position:fixed;
  right:20px;
  bottom:95px;
  width:390px;
  height:570px;
  border:none;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 0 28px rgba(0,255,255,.25);
  display:none;
  background:#0d1117;
  z-index:1100;
}

/* ================= MOBILE ================= */

@media(max-width:700px){
  .hero-title{
    font-size:28px;
  }

  .vtuber-frame{
    width:260px;
    height:260px;
  }

  #avatar{
    width:140px;
    bottom:38px;
  }

  #aiBox{
    width:calc(100vw - 24px);
    height:72vh;
    right:12px;
    bottom:86px;
  }
}
</style>
</head>

<body>

<header>

  <div class="logo-area">

    <img src="../img/logo.png" class="logo-img">

    <div>
      <a href="../index.html" class="logo">Erika099</a>
      <p class="logo-sub">AI Virtual Assistant</p>
    </div>

    <div class="settings-menu" id="settingsMenu">
      <a href="../index.html" class="menu-btn">Home</a>
      <a href="services.html" class="menu-btn">Services</a>
      <a href="skills.html" class="menu-btn">Skills</a>
      <a href="education.html" class="menu-btn">Education</a>
      <a href="experience.html" class="menu-btn">Experience</a>
      <a href="contact.html" class="menu-btn">Contact</a>
      <hr>
      <a class="menu-btn" onclick="toggleAI()">🤖 Open AI</a>
    </div>

  </div>

  <button class="menu-toggle" onclick="toggleMenu()">☰ Menu</button>

</header>

<div class="container">

  <div class="hero-title">🧠 AI Learning System</div>

  <div class="card">
    Selamat datang di AI Erika099 🚀<br>
    Tanya apa saja — aku siap membantu.
  </div>

  <div class="vtuber-box">

    <div class="vtuber-frame">
      <img class="frame-img" src="ai/img/frame.png" alt="frame">
      <img id="avatar" src="ai/img/vtuber.png" alt="avatar">
    </div>

    <div id="bubble">Klik layar sekali untuk mulai 🎤</div>

  </div>

</div>

<button class="ai-btn" onclick="toggleAI()">🤖</button>

<iframe id="aiBox" src="ai/assistant.html"></iframe>

<script>
function toggleMenu(){
  document
    .getElementById("settingsMenu")
    .classList.toggle("show");
}

function toggleAI(){
  const box = document.getElementById("aiBox");
  box.style.display =
    box.style.display === "block" ? "none" : "block";
}

const avatar = document.getElementById("avatar");
const bubble = document.getElementById("bubble");

setInterval(() => {
  avatar.src = "ai/img/vtuber-eyes-closed.png";

  setTimeout(() => {
    avatar.src = "ai/img/vtuber.png";
  }, 140);

}, 4200);

function speak(text){
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "id-ID";
  speechSynthesis.speak(u);
}

const SpeechRecognition =
  window.SpeechRecognition || window.webkitSpeechRecognition;

if(SpeechRecognition){

  const recognition = new SpeechRecognition();

  recognition.lang = "id-ID";
  recognition.continuous = true;
  recognition.interimResults = false;

  document.body.addEventListener("click", () => {
    recognition.start();
    bubble.innerText = "🎤 Aku lagi dengerin kamu...";
  }, { once:true });

  recognition.onresult = (e) => {
    const text =
      e.results[e.results.length - 1][0].transcript.toLowerCase();

    let reply = "Aku dengar: " + text;

    if(text.includes("halo")){
      reply = "Halo. Ada yang ingin kamu tanyakan?";
    }

    if(text.includes("siapa kamu")){
      reply = "Aku Erika AI. Asisten virtual di website ini.";
    }

    if(text.includes("hari apa")){
      const hari = [
        "Minggu",
        "Senin",
        "Selasa",
        "Rabu",
        "Kamis",
        "Jumat",
        "Sabtu"
      ];

      reply =
        "Hari ini " +
        hari[new Date().getDay()] +
        ".";
    }

    if(
      text.includes("buka ai") ||
      text.includes("open ai") ||
      text.includes("chat")
    ){
      toggleAI();
      reply = "Membuka AI assistant.";
    }

    bubble.innerText = reply;
    speak(reply);
  };

  recognition.onend = () => recognition.start();
  recognition.onerror = () => recognition.start();
}
</script>

</body>
    </html>
