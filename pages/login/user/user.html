<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Dashboard</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{background:#0f172a;color:white;}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 9%;
background:#1e293b;
box-shadow:0 0 10px #000;
}

.logo{color:#00ffcc;font-weight:bold;}

.btn{
background:#00ffcc;
border:none;
padding:6px 10px;
border-radius:5px;
cursor:pointer;
}

/* PRODUCT */
.container{padding:30px 9%;}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:10px;
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 0 10px #00ffcc55;
}

.card img{
width:100%;
border-radius:10px;
}

.price{
color:#00ffcc;
margin:5px 0;
}

.card button{
width:100%;
margin-top:5px;
padding:6px;
border:none;
border-radius:5px;
cursor:pointer;
}

/* CART */
.cart{
position:fixed;
right:-320px;
top:0;
width:300px;
height:100%;
background:#1e293b;
padding:20px;
transition:.4s;
overflow:auto;
}

.cart.show{right:0;}

.cart-item{
font-size:13px;
margin-bottom:10px;
border-bottom:1px solid #333;
padding-bottom:5px;
}

.total{
color:#00ffcc;
margin-top:10px;
}

.checkout{
width:100%;
padding:8px;
background:#00ffcc;
border:none;
margin-top:10px;
cursor:pointer;
}
</style>
</head>

<body>

<header>
<div class="logo">USER PANEL</div>

<div>
<button class="btn" onclick="toggleCart()">🛒</button>
<button class="btn" onclick="logout()">Logout</button>
</div>
</header>

<div class="container">
<div class="products" id="productList"></div>
</div>

<!-- CART -->
<div class="cart" id="cart">
<h3>Keranjang</h3>
<div id="cartItems"></div>
<p class="total" id="total"></p>
<button class="checkout" onclick="checkout()">Bayar</button>
</div>

<script>

/* PROTEKSI LOGIN */
let user = localStorage.getItem("user");
if(user !== "user"){
window.location.href="../login.html";
}

/* DATA PRODUK */
let products = [
{name:"Website Premium",price:500000,img:"https://via.placeholder.com/200"},
{name:"Script Bot",price:250000,img:"https://via.placeholder.com/200"},
{name:"UI Design Pack",price:150000,img:"https://via.placeholder.com/200"}
];

let cart=[];

/* LOAD PRODUK */
function loadProducts(){
let html="";
products.forEach((p,i)=>{
html+=`
<div class="card">
<img src="${p.img}">
<h3>${p.name}</h3>
<p class="price">Rp ${p.price}</p>
<button onclick="addCart(${i})">Tambah</button>
</div>`;
});
document.getElementById("productList").innerHTML=html;
}
loadProducts();

/* CART */
function addCart(i){
cart.push(products[i]);
renderCart();
}

function renderCart(){
let html="";
let total=0;

cart.forEach(p=>{
html+=`<div class="cart-item">${p.name} - Rp ${p.price}</div>`;
total+=p.price;
});

document.getElementById("cartItems").innerHTML=html;
document.getElementById("total").innerText="Total: Rp "+total;
}

/* TOGGLE CART */
function toggleCart(){
document.getElementById("cart").classList.toggle("show");
}

/* CHECKOUT */
function checkout(){
if(cart.length===0){
alert("Keranjang kosong");
return;
}

alert("Pembayaran berhasil 💳");

cart=[];
renderCart();
}

/* LOGOUT */
function logout(){
localStorage.removeItem("user");
window.location.href="../login.html";
}

</script>

</body>
</html>
