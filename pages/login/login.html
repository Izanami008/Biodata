<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Secure Login</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}

body{
height:100vh;
background:linear-gradient(135deg,#050505,#0a0a0a,#000);
display:flex;
justify-content:center;
align-items:center;
color:white;
}

/* LOGIN BOX */
.login-box{
width:360px;
padding:40px;
border-radius:20px;

background:rgba(255,255,255,0.03);
backdrop-filter:blur(15px);

border:1px solid rgba(0,255,157,0.15);

box-shadow:
0 0 20px rgba(0,255,157,0.15),
0 0 60px rgba(0,255,157,0.05);

text-align:center;

animation:fadeIn .8s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

.login-box h2{
color:#00ff9d;
margin-bottom:25px;
letter-spacing:2px;
}

/* INPUT */
.input-box{
position:relative;
margin-bottom:20px;
}

.input-box input{
width:100%;
padding:12px;
background:transparent;
border:1px solid rgba(0,255,157,0.3);
border-radius:8px;
color:#00ff9d;
outline:none;
transition:.3s;
}

.input-box input:focus{
border-color:#00ff9d;
box-shadow:0 0 8px rgba(0,255,157,0.4);
}

.input-box i{
position:absolute;
right:10px;
top:50%;
transform:translateY(-50%);
color:#00ff9d;
cursor:pointer;
}

/* BUTTON */
.login-btn{
width:100%;
padding:12px;
background:linear-gradient(45deg,#00ff9d,#00ffaa);
border:none;
border-radius:8px;
color:black;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

.login-btn:hover{
transform:translateY(-2px);
box-shadow:0 0 15px rgba(0,255,157,0.5);
}

/* SCAN LINE HALUS */
.scan-line{
position:absolute;
width:100%;
height:2px;
background:rgba(0,255,157,0.5);
top:0;
left:0;
animation:scan 6s linear infinite;
}

@keyframes scan{
0%{top:0;}
100%{top:100%;}
}

/* STATUS */
.status{
margin-top:15px;
font-size:12px;
color:#00ff9d;
}

/* ERROR */
#error{
color:red;
font-size:12px;
display:none;
margin-top:5px;
}

</style>
</head>

<body>

<div class="login-box">

<div class="scan-line"></div>

<h2>SECURE LOGIN</h2>

<div class="input-box">
<input type="text" id="username" placeholder="Username">
<i class="fa fa-user"></i>
</div>

<div class="input-box">
<input type="password" id="password" placeholder="Password">
<i class="fa fa-eye" onclick="togglePass()"></i>
</div>

<button class="login-btn" onclick="login()">LOGIN</button>

<p class="status" id="status"></p>
<p id="error">Username / Password salah</p>

</div>

<script>

/* SHOW PASSWORD */
function togglePass(){
let p=document.getElementById("password");
p.type = p.type==="password"?"text":"password";
}

/* LOGIN */
function login(){

let user=document.getElementById("username").value;
let pass=document.getElementById("password").value;

let status=document.getElementById("status");

status.innerText="Checking...";

setTimeout(()=>{

if(user==="admin" && pass==="12345"){

status.innerText="Login berhasil 🚀";

/* SIMPAN USER */
localStorage.setItem("user",user);

/* REDIRECT */
setTimeout(()=>{
window.location.href="../user/user.html";
},800);

}else{

status.innerText="";
document.getElementById("error").style.display="block";

}

},800);

}

</script>

</body>
</html>
