<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body{
background:#0f172a;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

/* BOX */
.box{
background:#1e293b;
padding:40px;
border-radius:15px;
width:350px;
box-shadow:0 0 20px rgba(0,255,204,0.3);
text-align:center;
transition:.3s;
}

.box.success{box-shadow:0 0 25px #00ffcc;}
.box.error{
animation:shake .3s;
box-shadow:0 0 20px red;
}

@keyframes shake{
0%{transform:translateX(0);}
25%{transform:translateX(-5px);}
50%{transform:translateX(5px);}
75%{transform:translateX(-5px);}
100%{transform:translateX(0);}
}

input{
padding:12px;
margin:10px 0;
width:100%;
border-radius:8px;
border:none;
outline:none;
}

button{
padding:12px;
width:100%;
margin-top:10px;
background:#00ffcc;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

button:hover{background:#00ccaa;}

.error-text{color:red;margin-bottom:10px;}

.profile-img{
width:80px;
height:80px;
border-radius:50%;
object-fit:cover;
margin-bottom:15px;
border:2px solid #00ffcc;
}

/* HOME */
.home-icon{
display:block;
margin-top:20px;
font-size:30px;
color:#00ffcc;
text-decoration:none;
}

/* LOGIN CINEMATIC */
#overlay{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
opacity:0;
pointer-events:none;
transition:1s;
z-index:999;
}

#overlay.show{
opacity:1;
pointer-events:auto;
}

#overlay h1{
color:#00ffcc;
}

/* FADE */
#fadeScreen{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:black;
opacity:0;
transition:.6s;
z-index:9999;
}

#fadeScreen.show{opacity:1;}

</style>
</head>

<body>

<div class="box" id="box">
<h2>Login</h2>

<img src="img/IMG_20260413_093051.png" class="profile-img">

<p class="error-text" id="errorMsg"></p>

<form id="loginForm">
<input type="text" id="username" placeholder="Username" required>
<input type="password" id="password" placeholder="Password" required>
<button type="submit">Login</button>
</form>

<a href="#" class="home-icon" onclick="goHome()">🏠</a>
</div>

<div id="overlay">
<h1 id="overlayText">ACCESS GRANTED</h1>
</div>

<div id="fadeScreen"></div>

<script>

/* AKUN */
const ADMIN = {user:"admin", pass:"12345"};
const USER  = {user:"user", pass:"12345"};

const form = document.getElementById("loginForm");
const errorMsg = document.getElementById("errorMsg");
const box = document.getElementById("box");
const overlay = document.getElementById("overlay");
const overlayText = document.getElementById("overlayText");

/* LOGIN */
form.addEventListener("submit", function(e){
e.preventDefault();

let u = document.getElementById("username").value.trim();
let p = document.getElementById("password").value.trim();

errorMsg.textContent="";
box.classList.remove("error","success");

/* ADMIN LOGIN */
if(u===ADMIN.user && p===ADMIN.pass){
loginSuccess("../admin/admin.html","admin");
return;
}

/* USER LOGIN (FIX PATH) */
if(u===USER.user && p===USER.pass){
loginSuccess("user/user.html","user");
return;
}

/* ERROR */
box.classList.add("error");
errorMsg.textContent="Username atau password salah!";
});

/* SUCCESS */
function loginSuccess(url,role){

box.classList.add("success");

/* SIMPAN LOGIN */
localStorage.setItem("user",role);

/* CINEMATIC */
overlay.classList.add("show");

setTimeout(()=>{
overlayText.innerText="LOADING...";
},800);

setTimeout(()=>{
window.location.href=url;
},1800);

}

/* HOME FADE */
function goHome(){

let fade=document.getElementById("fadeScreen");

fade.classList.add("show");

setTimeout(()=>{
window.location.href="../services.html";
},600);

}

</script>

</body>
</html>
