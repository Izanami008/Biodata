<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - Erika099</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:black;
color:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

/* BACKGROUND ANIMATION */
.bg{
position:absolute;
width:100%;
height:100%;
background:radial-gradient(circle,#0f0f0f,#000);
z-index:-1;
}

/* LOGIN BOX */
.login-box{
width:320px;
padding:30px;
background:#0a0a0a;
border-radius:15px;
border:1px solid #222;
box-shadow:
0 0 20px rgba(0,255,157,0.3),
0 0 60px rgba(0,255,157,0.1);
text-align:center;
}

.login-box h2{
margin-bottom:20px;
color:#00ff9d;
}

/* INPUT */
.input-box{
position:relative;
margin-bottom:20px;
}

.input-box input{
width:100%;
padding:10px;
background:black;
border:1px solid #00ff9d;
color:#00ff9d;
border-radius:6px;
outline:none;
}

.input-box i{
position:absolute;
right:10px;
top:50%;
transform:translateY(-50%);
color:#00ff9d;
}

/* BUTTON */
.login-btn{
width:100%;
padding:10px;
background:#00ff9d;
border:none;
border-radius:6px;
color:black;
cursor:pointer;
font-weight:bold;
transition:.3s;
}

.login-btn:hover{
background:#00ffaa;
}

/* ERROR */
#error{
color:red;
font-size:12px;
margin-top:10px;
display:none;
}

</style>
</head>

<body>

<div class="bg"></div>

<div class="login-box">

<h2>Admin Login</h2>

<div class="input-box">
<input type="text" id="username" placeholder="Username">
<i class="fa fa-user"></i>
</div>

<div class="input-box">
<input type="password" id="password" placeholder="Password">
<i class="fa fa-lock"></i>
</div>

<button class="login-btn" onclick="login()">Login</button>

<p id="error">Username atau password salah</p>

</div>

<script>

/* LOGIN FUNCTION */
function login(){

let user = document.getElementById("username").value;
let pass = document.getElementById("password").value;

/* SIMPLE LOGIN (EDIT SESUKA LU) */
if(user === "admin" && pass === "12345"){

alert("Login berhasil 🔥");

/* redirect ke halaman utama */
window.location.href = "../../index.html";

}else{

document.getElementById("error").style.display = "block";

}

}

</script>

</body>
</html>
