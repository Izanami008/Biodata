<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Secure Login</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#000000,#050505,#0a0a0a);
color:white;
}

/* LOGIN BOX */
.login-box{
width:350px;
padding:40px;

border-radius:20px;

background:rgba(255,255,255,0.03);
backdrop-filter:blur(25px);

border:1px solid rgba(255,255,255,0.08);

box-shadow:
0 10px 40px rgba(0,0,0,0.8),
0 0 30px rgba(0,255,157,0.08);

text-align:center;
}

/* TITLE */
.login-box h2{
margin-bottom:25px;
font-weight:600;
letter-spacing:1px;
color:#00ff9d;
}

/* INPUT */
.input-box{
position:relative;
margin-bottom:20px;
}

.input-box input{
width:100%;
padding:12px 40px 12px 12px;
background:transparent;
border:1px solid rgba(255,255,255,0.1);
border-radius:8px;
color:white;
outline:none;
transition:0.3s;
}

.input-box input:focus{
border-color:#00ff9d;
box-shadow:0 0 10px rgba(0,255,157,0.3);
}

/* ICON */
.input-box i{
position:absolute;
right:12px;
top:50%;
transform:translateY(-50%);
color:#00ff9d;
cursor:pointer;
}

/* BUTTON */
.login-btn{
width:100%;
padding:12px;

border:none;
border-radius:8px;

background:linear-gradient(45deg,#00ff9d,#00ffaa);
color:black;
font-weight:600;
cursor:pointer;

transition:0.3s;
}

.login-btn:hover{
transform:translateY(-2px);
box-shadow:0 5px 20px rgba(0,255,157,0.3);
}

/* ERROR */
#error{
margin-top:10px;
font-size:12px;
color:#ff4d4d;
display:none;
}

</style>
</head>

<body>

<div class="login-box">

<h2>Secure Login</h2>

<div class="input-box">
<input type="text" id="username" placeholder="Username">
<i class="fa fa-user"></i>
</div>

<div class="input-box">
<input type="password" id="password" placeholder="Password">
<i class="fa fa-eye" onclick="togglePass()"></i>
</div>

<button class="login-btn" onclick="login()">Login</button>

<p id="error">Username atau password salah</p>

</div>

<script>

/* SHOW PASSWORD */
function togglePass(){
let p=document.getElementById("password");
p.type = p.type==="password"?"text":"password";
}

/* LOGIN */
function login(){

let user=document.getElementById("username").value;
let pass=document.getElementById("password").value;

if(user==="admin" && pass==="12345"){

localStorage.setItem("user",user);
window.location.href="../user/user.html";

}else{

document.getElementById("error").style.display="block";

}

}

</script>

</body>
</html>
