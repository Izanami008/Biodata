<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Secure Login</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}

body{
height:100vh;
background:black;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
color:white;
}

/* BG PARTICLE */
canvas{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

/* LOGIN BOX */
.login-box{
width:350px;
padding:35px;
border-radius:20px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(15px);
border:1px solid rgba(0,255,157,0.2);
box-shadow:0 0 40px rgba(0,255,157,0.2);
text-align:center;
}

.login-box h2{
color:#00ff9d;
margin-bottom:20px;
}

/* INPUT */
.input-box{
position:relative;
margin-bottom:20px;
}

.input-box input{
width:100%;
padding:12px;
background:transparent;
border:1px solid #00ff9d;
border-radius:8px;
color:#00ff9d;
outline:none;
}

.input-box i{
position:absolute;
right:10px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
color:#00ff9d;
}

/* BUTTON */
.login-btn{
width:100%;
padding:12px;
background:#00ff9d;
border:none;
border-radius:8px;
color:black;
font-weight:bold;
cursor:pointer;
}

/* SCAN AREA */
.scan-box{
margin-top:20px;
height:6px;
background:#111;
border-radius:5px;
overflow:hidden;
display:none;
}

.scan-line{
height:100%;
width:0%;
background:linear-gradient(90deg,transparent,#00ff9d,transparent);
animation:scan 2s linear forwards;
}

@keyframes scan{
0%{width:0%;}
100%{width:100%;}
}

/* STATUS */
.status{
margin-top:10px;
font-size:12px;
color:#00ff9d;
display:none;
}

/* ERROR */
#error{
color:red;
font-size:12px;
margin-top:10px;
display:none;
}

</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="login-box">

<h2>AI SECURITY SCAN</h2>

<div class="input-box">
<input type="text" id="username" placeholder="Username">
<i class="fa fa-user"></i>
</div>

<div class="input-box">
<input type="password" id="password" placeholder="Password">
<i class="fa fa-eye" onclick="togglePass()"></i>
</div>

<button class="login-btn" onclick="scanLogin()">Start Scan</button>

<div class="scan-box" id="scanBox">
<div class="scan-line"></div>
</div>

<p class="status" id="status">Scanning...</p>
<p id="error">ACCESS DENIED</p>

</div>

<script>

/* SHOW PASSWORD */
function togglePass(){
let p=document.getElementById("password");
p.type = p.type==="password"?"text":"password";
}

/* SCAN LOGIN */
function scanLogin(){

let user=document.getElementById("username").value;
let pass=document.getElementById("password").value;

document.getElementById("error").style.display="none";

let scanBox=document.getElementById("scanBox");
let status=document.getElementById("status");

scanBox.style.display="block";
status.style.display="block";
status.innerText="Scanning identity...";

/* DELAY SCAN */
setTimeout(()=>{

if(user==="admin" && pass==="12345"){

status.innerText="Access Granted 🚀";

setTimeout(()=>{
window.location.href="../../index.html";
},1000);

}else{

status.innerText="Access Denied ❌";
document.getElementById("error").style.display="block";

}

},2000);

}

/* PARTICLE BG */
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

for(let i=0;i<80;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2,
dx:(Math.random()-0.5),
dy:(Math.random()-0.5)
});
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle="#00ff9d";
ctx.fill();

p.x+=p.dx;
p.y+=p.dy;

if(p.x<0||p.x>canvas.width)p.dx*=-1;
if(p.y<0||p.y>canvas.height)p.dy*=-1;
});

requestAnimationFrame(animate);
}
animate();

</script>

</body>
</html>
