<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Secure Access</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}

body{
height:100vh;
background:radial-gradient(circle at top,#0a0a0a,#000);
display:flex;
justify-content:center;
align-items:center;
color:white;
}

/* CONTAINER */
.login-box{
width:380px;
padding:45px;
border-radius:25px;

background:rgba(255,255,255,0.03);
backdrop-filter:blur(20px);

position:relative;
overflow:hidden;

border:1px solid rgba(255,255,255,0.08);

box-shadow:
0 10px 40px rgba(0,0,0,0.6),
0 0 40px rgba(0,255,157,0.08);

animation:fadeIn .8s ease;
}

/* BORDER GLOW */
.login-box::before{
content:"";
position:absolute;
inset:0;
padding:1px;
border-radius:25px;
background:linear-gradient(120deg,transparent,#00ff9d,transparent);
animation:borderMove 4s linear infinite;
-webkit-mask:
linear-gradient(#000 0 0) content-box,
linear-gradient(#000 0 0);
-webkit-mask-composite:xor;
mask-composite:exclude;
}

@keyframes borderMove{
0%{background-position:0%;}
100%{background-position:200%;}
}

/* TITLE */
.login-box h2{
text-align:center;
color:#00ff9d;
margin-bottom:30px;
letter-spacing:3px;
}

/* INPUT */
.input-box{
position:relative;
margin-bottom:22px;
}

.input-box input{
width:100%;
padding:14px;
background:transparent;
border:1px solid rgba(0,255,157,0.25);
border-radius:10px;
color:#00ff9d;
outline:none;
transition:.3s;
}

.input-box input:focus{
border-color:#00ff9d;
box-shadow:0 0 10px rgba(0,255,157,0.4);
}

/* ICON */
.input-box i{
position:absolute;
right:12px;
top:50%;
transform:translateY(-50%);
color:#00ff9d;
cursor:pointer;
transition:.3s;
}

.input-box i:hover{
transform:translateY(-50%) scale(1.2);
}

/* BUTTON */
.login-btn{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:linear-gradient(120deg,#00ff9d,#00ffaa);
color:black;
font-weight:bold;
cursor:pointer;
position:relative;
overflow:hidden;
transition:.3s;
}

/* SHINE EFFECT */
.login-btn::after{
content:"";
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,0.6),transparent);
transition:.5s;
}

.login-btn:hover::after{
left:100%;
}

.login-btn:hover{
box-shadow:0 0 20px rgba(0,255,157,0.5);
transform:translateY(-2px);
}

/* STATUS */
.status{
text-align:center;
margin-top:15px;
font-size:12px;
color:#00ff9d;
}

/* ERROR */
#error{
text-align:center;
color:red;
font-size:12px;
display:none;
margin-top:5px;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(30px);}
to{opacity:1;transform:translateY(0);}
}

</style>
</head>

<body>

<div class="login-box">

<h2>SECURE ACCESS</h2>

<div class="input-box">
<input type="text" id="username" placeholder="Username">
<i class="fa fa-user"></i>
</div>

<div class="input-box">
<input type="password" id="password" placeholder="Password">
<i class="fa fa-eye" onclick="togglePass()"></i>
</div>

<button class="login-btn" onclick="login()">ENTER SYSTEM</button>

<p class="status" id="status"></p>
<p id="error">Invalid credentials</p>

</div>

<script>

/* SHOW PASSWORD */
function togglePass(){
let p=document.getElementById("password");
p.type = p.type==="password"?"text":"password";
}

/* LOGIN */
function login(){

let user=document.getElementById("username").value;
let pass=document.getElementById("password").value;

let status=document.getElementById("status");

status.innerText="Authorizing...";

setTimeout(()=>{

if(user==="admin" && pass==="12345"){

status.innerText="Access Granted";

/* SAVE USER */
localStorage.setItem("user",user);

/* REDIRECT */
setTimeout(()=>{
window.location.href="../user/user.html";
},700);

}else{

status.innerText="";
document.getElementById("error").style.display="block";

}

},700);

}

</script>

</body>
</html>
