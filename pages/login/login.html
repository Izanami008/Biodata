<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Secure System</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}

body{
height:100vh;
background:black;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
color:white;
}

/* BG */
canvas{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
z-index:-2;
}

/* GRID */
.grid{
position:absolute;
width:100%;
height:100%;
background:
linear-gradient(#00ff9d22 1px, transparent 1px),
linear-gradient(90deg,#00ff9d22 1px, transparent 1px);
background-size:40px 40px;
animation:gridMove 20s linear infinite;
z-index:-1;
}

@keyframes gridMove{
from{transform:translateY(0);}
to{transform:translateY(40px);}
}

/* LOGIN BOX */
.login-box{
width:360px;
padding:35px;
border-radius:20px;

background:rgba(0,0,0,0.6);
backdrop-filter:blur(20px);

border:1px solid rgba(0,255,157,0.2);

box-shadow:
0 0 30px rgba(0,255,157,0.3),
0 0 80px rgba(0,255,157,0.1);

text-align:center;
animation:fadeIn 1s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:scale(0.9);}
to{opacity:1;transform:scale(1);}
}

.login-box h2{
color:#00ff9d;
margin-bottom:20px;
}

/* INPUT */
.input-box{
position:relative;
margin-bottom:20px;
}

.input-box input{
width:100%;
padding:12px;
background:transparent;
border:1px solid #00ff9d;
border-radius:8px;
color:#00ff9d;
outline:none;
transition:.3s;
}

.input-box input:focus{
box-shadow:0 0 10px #00ff9d;
}

.input-box i{
position:absolute;
right:10px;
top:50%;
transform:translateY(-50%);
color:#00ff9d;
cursor:pointer;
}

/* BUTTON */
.login-btn{
width:100%;
padding:12px;
background:linear-gradient(45deg,#00ff9d,#00ffaa);
border:none;
border-radius:8px;
color:black;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

.login-btn:hover{
transform:scale(1.05);
box-shadow:0 0 20px #00ff9d;
}

/* SCAN LINE */
.scan-line{
position:absolute;
top:0;
left:0;
width:100%;
height:2px;
background:#00ff9d;
box-shadow:0 0 10px #00ff9d;
animation:scan 3s linear infinite;
}

@keyframes scan{
0%{top:0;}
100%{top:100%;}
}

/* STATUS */
.status{
margin-top:15px;
font-size:12px;
color:#00ff9d;
height:20px;
}

/* ERROR */
#error{
color:red;
font-size:12px;
display:none;
}

/* TERMINAL TEXT */
.terminal{
margin-top:10px;
font-size:11px;
color:#00ff9d;
text-align:left;
height:60px;
overflow:hidden;
}

</style>
</head>

<body>

<canvas id="bg"></canvas>
<div class="grid"></div>

<div class="login-box">

<div class="scan-line"></div>

<h2>AI SECURITY SYSTEM</h2>

<div class="input-box">
<input type="text" id="username" placeholder="Username">
<i class="fa fa-user"></i>
</div>

<div class="input-box">
<input type="password" id="password" placeholder="Password">
<i class="fa fa-eye" onclick="togglePass()"></i>
</div>

<button class="login-btn" onclick="scanLogin()">INITIATE SCAN</button>

<p class="status" id="status"></p>
<p id="error">ACCESS DENIED</p>

<div class="terminal" id="terminal"></div>

</div>

<script>

/* SHOW PASSWORD */
function togglePass(){
let p=document.getElementById("password");
p.type = p.type==="password"?"text":"password";
}

/* TERMINAL EFFECT */
const terminal=document.getElementById("terminal");

function typeText(text){
terminal.innerHTML="";
let i=0;
let interval=setInterval(()=>{
terminal.innerHTML+=text[i];
i++;
if(i>=text.length) clearInterval(interval);
},20);
}

/* LOGIN SCAN */
function scanLogin(){

let user=document.getElementById("username").value;
let pass=document.getElementById("password").value;

document.getElementById("error").style.display="none";

let status=document.getElementById("status");

status.innerText="Scanning...";

typeText(">> Initializing AI Scan...\n>> Checking credentials...\n>> Access control...");

setTimeout(()=>{

if(user==="admin" && pass==="12345"){

status.innerText="ACCESS GRANTED 🚀";

typeText(">> Identity verified\n>> Welcome admin\n>> Redirecting...");

localStorage.setItem("user",user);

setTimeout(()=>{
window.location.href="../user/user.html";
},1200);

}else{

status.innerText="ACCESS DENIED ❌";
document.getElementById("error").style.display="block";

typeText(">> ERROR: Unauthorized\n>> System locked");

}

},2500);

}

/* PARTICLE BG */
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

for(let i=0;i<100;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2,
dx:(Math.random()-0.5),
dy:(Math.random()-0.5)
});
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle="#00ff9d";
ctx.fill();

p.x+=p.dx;
p.y+=p.dy;

if(p.x<0||p.x>canvas.width)p.dx*=-1;
if(p.y<0||p.y>canvas.height)p.dy*=-1;
});

requestAnimationFrame(animate);
}
animate();

</script>

</body>
  </html>
