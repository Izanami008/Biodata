<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login System</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}
body{
background:black;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* LOGIN BOX */
.login-box{
background:#0a0a0a;
padding:30px;
border-radius:15px;
width:300px;
text-align:center;
border:1px solid #111;
transition:.3s;
}

.login-box h2{margin-bottom:20px;color:#00ff9d;}

input{
width:100%;
padding:10px;
margin:8px 0;
background:#111;
border:none;
color:white;
border-radius:5px;
}

button{
width:100%;
padding:10px;
margin-top:10px;
background:#00ff9d;
border:none;
cursor:pointer;
border-radius:5px;
font-weight:bold;
}

/* STATUS */
#status{margin-top:10px;color:#00ff9d;}
#error{color:red;display:none;margin-top:10px;}

/* SUCCESS */
.success{
border-color:#00ff9d !important;
box-shadow:0 0 20px #00ff9d;
}

/* ERROR */
.error{
border-color:red !important;
box-shadow:0 0 15px red;
animation:shake .3s;
}

@keyframes shake{
0%{transform:translateX(0);}
25%{transform:translateX(-5px);}
50%{transform:translateX(5px);}
75%{transform:translateX(-5px);}
100%{transform:translateX(0);}
}

/* ICON */
.check{
font-size:40px;
color:#00ff9d;
margin-top:10px;
animation:pop .4s ease;
}

.cross{
font-size:40px;
color:red;
margin-top:10px;
animation:pop .4s ease;
}

@keyframes pop{
from{transform:scale(0);}
to{transform:scale(1);}
}

/* CINEMATIC */
#cinematic{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
opacity:0;
pointer-events:none;
transition:1s;
z-index:9999;
}

#cinematic.show{
opacity:1;
pointer-events:auto;
}

#cineText{
color:#00ff9d;
font-size:40px;
letter-spacing:5px;
opacity:0;
transform:scale(0.8);
}

/* TEXT ANIM */
@keyframes cineTextAnim{
0%{opacity:0;transform:scale(0.7);}
50%{opacity:1;transform:scale(1.1);}
100%{opacity:1;transform:scale(1);}
}

</style>
</head>

<body>

<div class="login-box">
<h2>LOGIN SYSTEM</h2>

<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">LOGIN</button>

<p id="status"></p>
<p id="error"></p>

</div>

<!-- CINEMATIC -->
<div id="cinematic">
<h1 id="cineText">ACCESS GRANTED</h1>
</div>

<script>

/* LOGIN */
function login(){

let box=document.querySelector(".login-box");

let user=document.getElementById("username").value.trim();
let pass=document.getElementById("password").value.trim();

let status=document.getElementById("status");
let error=document.getElementById("error");

/* RESET */
box.classList.remove("error","success");
error.style.display="none";
status.innerText="Verifying...";

setTimeout(()=>{

/* ADMIN */
if(user==="admin" && pass==="12345"){
box.classList.add("success");
startCinematic("../admin/admin.html","admin");
return;
}

/* USER */
if(user==="user" && pass==="12345"){
box.classList.add("success");
startCinematic("../user/user.html","user");
return;
}

/* ERROR */
box.classList.add("error");
status.innerHTML="";
error.style.display="block";
error.innerHTML='Access Denied <div class="cross"><i class="fa fa-times"></i></div>';

},800);

}

/* CINEMATIC */
function startCinematic(url,role){

let cine=document.getElementById("cinematic");
let text=document.getElementById("cineText");

/* SHOW */
cine.classList.add("show");

/* ANIM TEXT */
text.style.animation="cineTextAnim 1s ease forwards";

/* SAVE USER */
localStorage.setItem("user",role);

/* TRANSISI */
setTimeout(()=>{
text.innerText="LOADING SYSTEM...";
text.style.animation="none";
text.style.opacity="1";
},1200);

setTimeout(()=>{
window.location.href=url;
},2200);

}

</script>

</body>
</html>
