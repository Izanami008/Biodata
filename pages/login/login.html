<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Secure Login</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}

body{
background:black;
color:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

/* BACKGROUND GRID */
body::before{
content:"";
position:absolute;
width:200%;
height:200%;
background:linear-gradient(#00ff9d22 1px,transparent 1px),
linear-gradient(90deg,#00ff9d22 1px,transparent 1px);
background-size:40px 40px;
animation:gridMove 20s linear infinite;
}

@keyframes gridMove{
from{transform:translate(0,0);}
to{transform:translate(-40px,-40px);}
}

/* SCAN LINE */
.scan{
position:absolute;
width:100%;
height:2px;
background:#00ff9d;
animation:scan 3s linear infinite;
}

@keyframes scan{
0%{top:0;}
100%{top:100%;}
}

/* LOGIN BOX */
.login-box{
position:relative;
background:#0a0a0a;
padding:35px;
border-radius:15px;
width:320px;
text-align:center;
border:1px solid #111;
box-shadow:0 0 20px #00ff9d33;
z-index:2;
}

.login-box h2{
color:#00ff9d;
margin-bottom:20px;
letter-spacing:2px;
}

/* INPUT */
.input-box{
position:relative;
margin:10px 0;
}

.input-box input{
width:100%;
padding:12px;
background:#111;
border:none;
color:white;
border-radius:5px;
outline:none;
}

.input-box label{
position:absolute;
left:10px;
top:50%;
transform:translateY(-50%);
color:#555;
transition:.3s;
pointer-events:none;
}

/* FLOAT LABEL */
.input-box input:focus + label,
.input-box input:valid + label{
top:-8px;
font-size:12px;
color:#00ff9d;
}

/* BUTTON */
button{
width:100%;
padding:10px;
margin-top:15px;
background:#00ff9d;
border:none;
cursor:pointer;
border-radius:5px;
font-weight:bold;
transition:.3s;
}

button:hover{
background:#00cc7a;
}

/* STATUS */
#status{margin-top:10px;color:#00ff9d;}
#error{color:red;display:none;margin-top:10px;}

/* SUCCESS */
.success{
box-shadow:0 0 25px #00ff9d;
}

/* ERROR */
.error{
box-shadow:0 0 20px red;
animation:shake .3s;
}

@keyframes shake{
0%{transform:translateX(0);}
25%{transform:translateX(-5px);}
50%{transform:translateX(5px);}
75%{transform:translateX(-5px);}
100%{transform:translateX(0);}
}

/* CINEMATIC */
#cinematic{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
opacity:0;
pointer-events:none;
transition:1s;
z-index:9999;
}

#cinematic.show{opacity:1;}

#cineText{
color:#00ff9d;
font-size:42px;
letter-spacing:6px;
opacity:0;
transform:scale(0.8);
}

@keyframes cineTextAnim{
0%{opacity:0;transform:scale(0.7);}
50%{opacity:1;transform:scale(1.1);}
100%{opacity:1;transform:scale(1);}
}

</style>
</head>

<body>

<div class="scan"></div>

<div class="login-box">
<h2>AI LOGIN</h2>

<div class="input-box">
<input type="text" id="username" required>
<label>Username</label>
</div>

<div class="input-box">
<input type="password" id="password" required>
<label>Password</label>
</div>

<button onclick="login()">ACCESS SYSTEM</button>

<p id="status"></p>
<p id="error"></p>

</div>

<div id="cinematic">
<h1 id="cineText">ACCESS GRANTED</h1>
</div>

<script>

function login(){

let box=document.querySelector(".login-box");

let user=document.getElementById("username").value.trim();
let pass=document.getElementById("password").value.trim();

let status=document.getElementById("status");
let error=document.getElementById("error");

box.classList.remove("error","success");
error.style.display="none";
status.innerText="Scanning...";

setTimeout(()=>{

if(user==="admin" && pass==="12345"){
box.classList.add("success");
startCine("../admin/admin.html","admin");
return;
}

if(user==="user" && pass==="12345"){
box.classList.add("success");
startCine("../user/user.html","user");
return;
}

/* ERROR */
box.classList.add("error");
status.innerText="";
error.style.display="block";
error.innerText="ACCESS DENIED";

},900);

}

function startCine(url,role){

let cine=document.getElementById("cinematic");
let text=document.getElementById("cineText");

cine.classList.add("show");

text.style.animation="cineTextAnim 1s ease forwards";

localStorage.setItem("user",role);

setTimeout(()=>{
text.innerText="INITIALIZING SYSTEM...";
text.style.opacity="1";
},1200);

setTimeout(()=>{
window.location.href=url;
},2300);

}

</script>

</body>
</html>
