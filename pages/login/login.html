<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body{
background:#0f172a;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

/* BOX */
.box{
background:#1e293b;
padding:40px;
border-radius:15px;
width:350px;
box-shadow:0 0 20px rgba(0,255,204,0.3);
text-align:center;
transition:.3s;
}

.box.success{
box-shadow:0 0 25px #00ffcc;
}

.box.error{
animation:shake .3s;
box-shadow:0 0 20px red;
}

@keyframes shake{
0%{transform:translateX(0);}
25%{transform:translateX(-5px);}
50%{transform:translateX(5px);}
75%{transform:translateX(-5px);}
100%{transform:translateX(0);}
}

.box h2{margin-bottom:20px;}

input{
padding:12px;
margin:10px 0;
width:100%;
border-radius:8px;
border:none;
outline:none;
}

/* BUTTON */
button{
padding:12px;
width:100%;
margin-top:10px;
background:#00ffcc;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#00ccaa;
}

/* ERROR */
.error-text{
color:red;
margin-bottom:10px;
}

/* PROFILE */
.profile-img{
width:80px;
height:80px;
border-radius:50%;
object-fit:cover;
margin-bottom:15px;
border:2px solid #00ffcc;
box-shadow:0 0 15px #00ffcc;
}

/* HOME */
.home-icon{
display:block;
margin:20px auto 0;
font-size:30px;
color:#00ffcc;
text-decoration:none;
}

/* CINEMATIC */
#overlay{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
opacity:0;
pointer-events:none;
transition:1s;
z-index:999;
}

#overlay.show{
opacity:1;
pointer-events:auto;
}

#overlay h1{
color:#00ffcc;
font-size:30px;
letter-spacing:4px;
animation:fadeIn 1s;
}

@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}
</style>
</head>

<body>

<div class="box" id="box">
<h2>Login</h2>

<!-- FOTO -->
<img src="img/IMG_20260413_093051.png" class="profile-img">

<p class="error-text" id="errorMsg"></p>

<form id="loginForm">
<input type="text" id="username" placeholder="Username" required>
<input type="password" id="password" placeholder="Password" required>
<button type="submit">Login</button>
</form>

<a href="../index.html" class="home-icon">🏠</a>
</div>

<!-- CINEMATIC -->
<div id="overlay">
<h1 id="overlayText">ACCESS GRANTED</h1>
</div>

<script>

/* AKUN FIX */
const ADMIN = {user:"admin", pass:"12345"};
const USER  = {user:"user", pass:"12345"};

const form = document.getElementById("loginForm");
const errorMsg = document.getElementById("errorMsg");
const box = document.getElementById("box");
const overlay = document.getElementById("overlay");
const overlayText = document.getElementById("overlayText");

form.addEventListener("submit", function(e){
e.preventDefault();

let u = username.value.trim();
let p = password.value.trim();

errorMsg.textContent="";
box.classList.remove("error","success");

/* ADMIN */
if(u===ADMIN.user && p===ADMIN.pass){
success("../admin/admin.html","admin");
return;
}

/* USER */
if(u===USER.user && p===USER.pass){
success("../user/user.html","user");
return;
}

/* ERROR */
box.classList.add("error");
errorMsg.textContent="Username atau password salah!";

});

/* SUCCESS */
function success(url,role){

box.classList.add("success");

/* SIMPAN ROLE */
localStorage.setItem("user",role);

/* CINEMATIC */
overlay.classList.add("show");

setTimeout(()=>{
overlayText.innerText="LOADING...";
},1000);

setTimeout(()=>{
window.location.href=url;
},2000);

}

</script>

</body>
  </html>
