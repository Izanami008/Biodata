<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f172a;
    color:#fff;
}

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:16px 8%;
    background:#1e293b;
    position:sticky;
    top:0;
}

.logo{
    color:#00ffcc;
    font-size:20px;
    font-weight:bold;
}

.header-right{
    display:flex;
    gap:8px;
}

.btn{
    border:none;
    background:#00ffcc;
    color:#000;
    font-weight:bold;
    padding:8px 12px;
    border-radius:8px;
    cursor:pointer;
    text-decoration:none;
}

.container{
    padding:30px 8%;
}

.form{
    background:#1e293b;
    padding:20px;
    border-radius:14px;
    margin-bottom:25px;
}

.form h2{
    margin-bottom:15px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:12px;
}

input, textarea{
    width:100%;
    padding:11px 12px;
    border:none;
    border-radius:8px;
    outline:none;
    background:#0f172a;
    color:#fff;
}

textarea{
    resize:none;
    min-height:90px;
}

.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:18px;
}

.card{
    background:#1e293b;
    border-radius:14px;
    padding:14px;
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
    border-radius:10px;
    margin-bottom:10px;
}

.price{
    color:#00ffcc;
    font-weight:bold;
    margin-top:6px;
}

.stock{
    opacity:.7;
    font-size:13px;
    margin-top:4px;
}

.desc{
    opacity:.85;
    font-size:14px;
    margin-top:8px;
    line-height:1.5;
}

.actions{
    margin-top:12px;
    display:flex;
    gap:8px;
}

.delete{
    background:#ef4444;
    color:#fff;
}

.empty{
    opacity:.7;
    padding:20px;
}
</style>
</head>

<body>

<header>
    <div class="logo">ADMIN PANEL</div>

    <div class="header-right">
        <a href="../user/user.html" class="btn">User</a>
        <button class="btn" onclick="logout()">Logout</button>
    </div>
</header>

<div class="container">

    <div class="form">
        <h2>Tambah Produk</h2>

        <div class="grid">
            <input type="text" id="name" placeholder="Nama produk">
            <input type="number" id="price" placeholder="Harga">
            <input type="number" id="stock" placeholder="Stok">
            <input type="file" id="image" accept="image/*">
        </div>

        <div style="margin-top:12px;">
            <textarea id="desc" placeholder="Deskripsi produk"></textarea>
        </div>

        <div style="margin-top:14px;">
            <button class="btn" onclick="addProduct()">Tambah Produk</button>
        </div>
    </div>

    <div class="products" id="productList"></div>

</div>

<script>
let user = localStorage.getItem("user");

if(user !== "admin"){
    window.location.href = "../login.html";
}

let products = JSON.parse(localStorage.getItem("products")) || [];

function saveProducts(){
    localStorage.setItem("products", JSON.stringify(products));
}

function loadProducts(){

    if(products.length === 0){
        document.getElementById("productList").innerHTML =
            `<div class="empty">Belum ada produk</div>`;
        return;
    }

    let html = "";

    products.forEach((p,i)=>{
        html += `
        <div class="card">
            <img src="${p.image}">
            <h3>${p.name}</h3>
            <div class="price">Rp ${Number(p.price).toLocaleString("id-ID")}</div>
            <div class="stock">Stok: ${p.stock}</div>
            <div class="desc">${p.desc}</div>

            <div class="actions">
                <button class="btn" onclick="editStock(${i})">Edit Stok</button>
                <button class="btn delete" onclick="deleteProduct(${i})">Hapus</button>
            </div>
        </div>`;
    });

    document.getElementById("productList").innerHTML = html;
}

function addProduct(){

    let name = document.getElementById("name").value.trim();
    let price = document.getElementById("price").value;
    let stock = document.getElementById("stock").value;
    let desc = document.getElementById("desc").value.trim();
    let file = document.getElementById("image").files[0];

    if(!name || !price || !stock || !desc || !file){
        alert("Lengkapi data");
        return;
    }

    let reader = new FileReader();

    reader.onload = function(e){

        products.push({
            name:name,
            price:Number(price),
            stock:Number(stock),
            desc:desc,
            image:e.target.result
        });

        saveProducts();
        loadProducts();

        document.getElementById("name").value = "";
        document.getElementById("price").value = "";
        document.getElementById("stock").value = "";
        document.getElementById("desc").value = "";
        document.getElementById("image").value = "";
    };

    reader.readAsDataURL(file);
}

function deleteProduct(i){
    if(!confirm("Hapus produk ini?")) return;

    products.splice(i,1);
    saveProducts();
    loadProducts();
}

function editStock(i){
    let newStock = prompt("Masukkan stok baru:", products[i].stock);

    if(newStock === null) return;

    newStock = Number(newStock);

    if(isNaN(newStock) || newStock < 0){
        alert("Stok tidak valid");
        return;
    }

    products[i].stock = newStock;

    saveProducts();
    loadProducts();
}

function logout(){
    localStorage.removeItem("user");
    window.location.href = "../login.html";
}

loadProducts();
</script>

</body>
  </html>
