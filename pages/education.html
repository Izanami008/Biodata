<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Education - Erika099</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>

/* ================= RESET ================= */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:black;
color:white;
overflow-x:hidden;
}

/* ================= HEADER ================= */
header{
position:fixed;
top:0;
width:100%;
padding:15px 9%;
background:black;
display:flex;
align-items:center;
border-bottom:1px solid #111;
z-index:1000;
}

.logo-area{
display:flex;
align-items:center;
cursor:pointer;
}

.logo-img{
width:45px;
margin-right:10px;
}

.logo{
color:#b74b4b;
font-size:22px;
text-decoration:none;
font-weight:bold;
}

/* ================= MENU ================= */
.menu{
position:absolute;
top:70px;
left:9%;
background:#111;
padding:15px;
border-radius:10px;
display:none;
flex-direction:column;
gap:10px;
}

.menu.show{display:flex;}

.menu a{
color:white;
text-decoration:none;
padding:8px;
border-radius:6px;
}

.menu a:hover{background:#222;}

/* ================= SECTION ================= */
section{
padding-top:120px;
text-align:center;
}

/* ================= TIMELINE ================= */
.timeline{
max-width:800px;
margin:auto;
}

.timeline-item{
background:#111;
margin:20px;
padding:20px;
border-radius:10px;
border:1px solid #222;
transition:0.3s;
}

.timeline-item:hover{
transform:translateY(-5px);
box-shadow:0 0 15px #b74b4b;
}

/* ================= MONEY ================= */
.money{
margin-top:20px;
font-size:22px;
white-space:nowrap;
animation:run 12s linear infinite;
}

@keyframes run{
0%{transform:translateX(-100%)}
100%{transform:translateX(100%)}
}

/* ================= CHART ================= */
#chartBox{
width:90%;
max-width:900px;
margin:40px auto;
background:#111;
padding:15px;
border-radius:12px;
border:1px solid #222;
}

/* ================= PLANET ================= */
#planetCanvas{
width:100%;
height:400px;
margin-top:30px;
}

/* ================= NEWS ================= */
.news{
max-width:1000px;
margin:auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
padding:20px;
}

.news-item{
background:#111;
padding:15px;
border-radius:10px;
border:1px solid #222;
transition:0.3s;
}

.news-item:hover{
transform:translateY(-5px);
box-shadow:0 0 10px #00ff88;
}

/* ================= BACKGROUND ANIMATION ================= */
.bg-line{
position:fixed;
width:2px;
height:100%;
background:linear-gradient(transparent,#00ff88,transparent);
left:50%;
animation:move 5s linear infinite;
opacity:0.2;
}

@keyframes move{
0%{transform:translateY(-100%)}
100%{transform:translateY(100%)}
}

</style>
</head>

<body>

<div class="bg-line"></div>

<header>
<div class="logo-area" onclick="toggleMenu()">
<img src="../img/logo.png" class="logo-img">
<a href="../index.html" class="logo">Erika099</a>
</div>

<div class="menu" id="menu">
<a href="../index.html">Home</a>
<a href="skills.html">Skills</a>
<a href="education.html">Education</a>
<a href="contact.html">Contact</a>
</div>
</header>

<section>

<h1>My Education</h1>

<div class="timeline">
<div class="timeline-item">Elementary School</div>
<div class="timeline-item">Junior High School</div>
<div class="timeline-item">Senior High School</div>
<div class="timeline-item">Self Learning Programming</div>
</div>

<div class="money">💰 Knowledge → Skill → Money → Success 💰</div>

<div id="chartBox">
<h2>Crypto Style Chart</h2>
<canvas id="chart"></canvas>
</div>

<h2>3D Earth</h2>
<canvas id="planetCanvas"></canvas>

<h2>Education News</h2>
<div class="news" id="news">Loading...</div>

</section>

<script>

/* ================= MENU ================= */
function toggleMenu(){
document.getElementById("menu").classList.toggle("show");
}

/* ================= CHART ================= */
let data=[10,20,15,30,25,40,35,50];

const chart=new Chart(document.getElementById("chart"),{
type:"line",
data:{
labels:data.map((_,i)=>i),
datasets:[{
data:data,
borderColor:"#00ff88",
borderWidth:2,
tension:0.4
}]
},
options:{
plugins:{legend:{display:false}},
scales:{x:{display:false},y:{display:false}}
}
});

/* update tiap 5 menit */
setInterval(()=>{
let last=data[data.length-1];
data.push(last+(Math.random()*10-5));
data.shift();
chart.data.labels=data.map((_,i)=>i);
chart.data.datasets[0].data=data;
chart.update();
},300000);

/* ================= THREE JS ================= */
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(75,window.innerWidth/400,0.1,1000);
const renderer=new THREE.WebGLRenderer({canvas:document.getElementById("planetCanvas"),alpha:true});

renderer.setSize(window.innerWidth,400);

const geometry=new THREE.SphereGeometry(2,64,64);
const loader=new THREE.TextureLoader();
const texture=loader.load("../img/earth.jpg");

const material=new THREE.MeshStandardMaterial({map:texture});
const earth=new THREE.Mesh(geometry,material);

scene.add(earth);

const light=new THREE.PointLight(0xffffff,1.2);
light.position.set(5,5,5);
scene.add(light);

camera.position.z=5;

function animate(){
requestAnimationFrame(animate);
earth.rotation.y+=0.003;
renderer.render(scene,camera);
}
animate();

/* ================= NEWS RSS ================= */
const feed="https://news.google.com/rss/search?q=pendidikan&hl=id&gl=ID&ceid=ID:id";

fetch("https://api.allorigins.win/get?url="+encodeURIComponent(feed))
.then(res=>res.json())
.then(data=>{
let parser=new DOMParser();
let xml=parser.parseFromString(data.contents,"text/xml");
let items=xml.querySelectorAll("item");

let html="";
items.forEach((item,i)=>{
if(i<6){
html+=`
<div class="news-item">
<a href="${item.querySelector("link").textContent}" target="_blank">
${item.querySelector("title").textContent}
</a>
</div>`;
}
});

document.getElementById("news").innerHTML=html;
});

</script>

</body>
    </html>
