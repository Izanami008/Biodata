<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI + BTC System</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-chart-financial"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}
body{background:black;color:white;overflow-x:hidden;}

/* HEADER */
header{
position:fixed;top:0;left:0;width:100%;
padding:15px 9%;background:black;
display:flex;align-items:center;z-index:1000;
}

.logo-area{display:flex;align-items:center;cursor:pointer;}
.logo-img{width:50px;margin-right:10px;}

.logo{font-size:22px;font-weight:bold;color:#b74b4b;text-decoration:none;}
.logo-sub{font-size:12px;color:gray;}

.settings-menu{
position:absolute;top:70px;left:9%;
background:#111;padding:15px;border-radius:10px;
display:none;flex-direction:column;gap:10px;
min-width:180px;
}

.settings-menu.show{display:flex;}

.menu-btn{
color:white;text-decoration:none;padding:8px;border-radius:6px;
cursor:pointer;
}

.container{padding:120px 9%;text-align:center;}

.ai-btn{
padding:10px 15px;background:#6c5ce7;border:none;color:white;
border-radius:8px;cursor:pointer;
}

#aiBox{
position:fixed;
right:20px;
bottom:90px;
width:360px;
height:520px;
border:none;
border-radius:15px;
box-shadow:0 0 20px cyan;
display:none;
z-index:9999;
}

#btcChart{max-width:700px;margin-top:30px;}
</style>
</head>

<body>

<header>
<div class="logo-area">
<img src="../img/logo.png" class="logo-img">
<div>
<a href="../index.html" class="logo">Erika099</a>
<p class="logo-sub">Personal Biography</p>
</div>
</div>
</header>

<div class="container">

<h2>🧠 AI Assistant System</h2>

<button class="ai-btn" onclick="toggleAI()">🤖 Open AI</button>

<iframe id="aiBox" src="../ai/assistant.html"></iframe>

<h2 style="margin-top:40px;">📊 BTC Chart</h2>
<canvas id="btcChart"></canvas>

</div>

<script>
function toggleAI(){
let box=document.getElementById("aiBox");
box.style.display = box.style.display==="block"?"none":"block";
}

/* BTC */
function candle(last){
let o=last;
let c=o+(Math.random()*200-100);
let h=Math.max(o,c)+Math.random()*80;
let l=Math.min(o,c)-Math.random()*80;
return {o,h,l,c};
}

let last=30000;
let data=[];

for(let i=0;i<20;i++){
let c=candle(last);
data.push(c);
last=c.c;
}

const ctx=document.getElementById("btcChart").getContext("2d");

const chart=new Chart(ctx,{
type:"candlestick",
data:{
datasets:[{
label:"BTC",
data:data.map((d,i)=>({x:i,o:d.o,h:d.h,l:d.l,c:d.c}))
}]
}
});

setInterval(()=>{
let c=candle(last);
last=c.c;
data.push(c);
data.shift();

chart.data.datasets[0].data=data.map((d,i)=>({x:i,o:d.o,h:d.h,l:d.l,c:d.c}));
chart.update();
},2000);
</script>

</body>
</html>
