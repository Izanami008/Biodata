<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Erika099 - Education AI System</title>

<!-- CHART LIB -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-chart-financial"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>

<style>

/* ================= RESET ================= */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background: radial-gradient(circle at top,#0b0f1a,#000);
color:white;
overflow-x:hidden;
}

/* ================= HEADER ================= */
header{
position:fixed;
top:0;
left:0;
width:100%;
padding:15px 9%;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(12px);
border-bottom:1px solid rgba(255,255,255,0.08);
z-index:1000;
}

.logo-area{
display:flex;
align-items:center;
gap:10px;
cursor:pointer;
}

.logo-img{
width:45px;
filter:drop-shadow(0 0 10px cyan);
}

.logo{
font-size:20px;
font-weight:bold;
color:#b74b4b;
text-decoration:none;
}

.logo-sub{
font-size:12px;
color:gray;
}

/* ================= MENU ================= */
.menu-btn{
background:transparent;
border:none;
color:white;
cursor:pointer;
padding:8px 10px;
border-radius:8px;
transition:0.3s;
}

.menu-btn:hover{
background:rgba(255,255,255,0.08);
}

.menu-box{
position:absolute;
top:70px;
right:9%;
background:rgba(20,20,20,0.95);
backdrop-filter:blur(10px);
padding:15px;
border-radius:12px;
display:none;
flex-direction:column;
gap:10px;
min-width:180px;
border:1px solid rgba(255,255,255,0.1);
}

.menu-box.show{
display:flex;
}

/* ================= CONTENT ================= */
.container{
padding:120px 9% 60px;
text-align:center;
}

.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
padding:20px;
border-radius:15px;
border:1px solid rgba(255,255,255,0.1);
margin-top:20px;
}

/* ================= BTC CHART ================= */
#btcChart{
max-width:750px;
height:400px; /* WAJIB */
margin:30px auto;
background:rgba(255,255,255,0.03);
padding:10px;
border-radius:12px;
}

/* ================= AI BUTTON ================= */
.ai-btn{
position:fixed;
right:20px;
bottom:20px;
width:60px;
height:60px;
border-radius:50%;
background:linear-gradient(45deg,#00ffcc,#6c5ce7);
color:white;
font-size:22px;
border:none;
cursor:pointer;
box-shadow:0 0 20px #00ffcc;
z-index:9999;
}

#aiBox{
position:fixed;
right:20px;
bottom:90px;
width:360px;
height:520px;
border:none;
border-radius:15px;
box-shadow:0 0 25px cyan;
display:none;
z-index:9998;
}

h2{
margin-top:25px;
text-shadow:0 0 10px rgba(0,255,255,0.2);
}

</style>
</head>

<body>

<!-- HEADER -->
<header>

<div class="logo-area" onclick="location.href='../index.html'">
<img src="../img/logo.png" class="logo-img">

<div>
<a href="../index.html" class="logo">Erika099</a>
<div class="logo-sub">AI Education System</div>
</div>
</div>

<div>
<button class="menu-btn" onclick="toggleMenu()">☰ Menu</button>

<div class="menu-box" id="menuBox">
<a href="../index.html" class="menu-btn">Home</a>
<a href="services.html" class="menu-btn">Services</a>
<a href="skills.html" class="menu-btn">Skills</a>
<a href="education.html" class="menu-btn">Education</a>
<a href="experience.html" class="menu-btn">Experience</a>
<a href="contact.html" class="menu-btn">Contact</a>

<hr style="border:0.5px solid #333">

<a class="menu-btn" onclick="toggleAI()">🤖 Open AI</a>
</div>

</div>
</header>

<!-- CONTENT -->
<div class="container">

<h2>🧠 AI Learning System</h2>

<div class="card">
<p>Selamat datang di AI Erika099 🚀</p>
<p>Belajar coding + AI assistant + market analysis.</p>
</div>

<h2>📊 BTC MARKET CHART</h2>
<canvas id="btcChart"></canvas>

</div>

<!-- AI BUTTON -->
<button class="ai-btn" onclick="toggleAI()">🤖</button>
<iframe id="aiBox" src="ai/assistant.html"></iframe>

<!-- SCRIPT -->
<script>

/* MENU */
function toggleMenu(){
document.getElementById("menuBox").classList.toggle("show");
}

/* AI */
function toggleAI(){
let box=document.getElementById("aiBox");
box.style.display=(box.style.display==="block")?"none":"block";
}

/* ================= BTC CHART ================= */

const ctx = document.getElementById("btcChart").getContext("2d");

const chart = new Chart(ctx,{
type:"candlestick",
data:{
datasets:[{
label:"BTC/USDT",
data:[],
color:{
up:'#00ffcc',
down:'#ff4d4d',
unchanged:'#999'
}
}]
},
options:{
responsive:true,
plugins:{
legend:{display:false}
},
scales:{
x:{
type:"time",
time:{unit:"minute"},
ticks:{color:"white"}
},
y:{
ticks:{color:"white"}
}
}
}
});

/* ================= LOAD DATA ================= */
async function loadBTC(){
try{
const res = await fetch("https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=15m&limit=50");
const raw = await res.json();

const data = raw.map(d => ({
x: new Date(d[0]),
o: parseFloat(d[1]),
h: parseFloat(d[2]),
l: parseFloat(d[3]),
c: parseFloat(d[4])
}));

chart.data.datasets[0].data = data;
chart.update();

}catch(e){
console.log("BTC ERROR:", e);
}
}

/* LOAD */
loadBTC();

/* AUTO UPDATE */
setInterval(loadBTC,15000);

</script>

</body>
</html>
