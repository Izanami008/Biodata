<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Erika099 AI Final Complete</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
body{
margin:0;
background:black;
color:white;
font-family:sans-serif;
text-align:center;
}

header{
padding:15px;
background:#111;
border-bottom:1px solid #222;
font-weight:bold;
}

.timeline-item{
background:#111;
margin:12px auto;
padding:12px;
max-width:600px;
border-radius:10px;
border:1px solid #222;
}

.ai-box{
max-width:600px;
margin:30px auto;
background:#111;
padding:20px;
border-radius:12px;
border:1px solid #333;
}

button{
padding:10px 15px;
background:#6c5ce7;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

#aiText{
margin-top:10px;
color:#00ffcc;
min-height:40px;
}

canvas{
margin-top:20px;
}
</style>
</head>

<body>

<header>
💜 ERIKA099 AI FINAL COMPLETE SYSTEM
</header>

<h2>📚 Education</h2>

<div class="timeline-item">Elementary School</div>
<div class="timeline-item">Junior High School</div>
<div class="timeline-item">Senior High School</div>
<div class="timeline-item">Self Learning Programming</div>

<!-- AI -->
<div class="ai-box">
<h3>🧠 AI Assistant</h3>
<div id="aiText">Klik tombol dan bicara</div>
<button onclick="startAI()">🎤 Talk to AI</button>
</div>

<!-- CHART -->
<canvas id="chart"></canvas>

<!-- ECLIPSE -->
<h3>🌑 Eclipse Simulation</h3>
<canvas id="eclipse" width="400" height="300"></canvas>

<script>

/* ================= SPEECH INPUT ================= */
let rec;

function startAI(){

rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
rec.lang="id-ID";

rec.onresult = async (e)=>{
let text = e.results[0][0].transcript;

let reply = aiBrain(text);

document.getElementById("aiText").innerHTML =
"👤 Kamu: " + text + "<br>🧠 AI: " + reply;

speak(reply);
};

rec.start();
}

/* ================= AI BRAIN (SMART LOCAL) ================= */
function aiBrain(text){

text = text.toLowerCase();

/* greeting */
if(text.includes("halo")) return "Halo 💜 aku di sini untuk bantu kamu";

/* problem solver */
if(text.includes("bingung")) return "Coba pecah masalah jadi bagian kecil dulu, mulai dari yang paling mudah.";

if(text.includes("stress")) return "Tarik napas pelan, istirahat sebentar, kamu pasti bisa.";

if(text.includes("belajar")) return "Belajar efektif itu 30% teori 70% praktek.";

if(text.includes("error")) return "Coba cek bagian terakhir yang kamu ubah, biasanya di situ sumber masalah.";

if(text.includes("sayang")) return "Aku selalu di sini untuk kamu 💜";

/* default */
return "Aku ngerti. Coba jelaskan lebih detail supaya aku bisa bantu lebih tepat.";
}

/* ================= VOICE CEWE LEMBUT ================= */
function speak(text){

let msg = new SpeechSynthesisUtterance(text);

let voices = speechSynthesis.getVoices();
let female = voices.find(v =>
v.lang.includes("id") || v.name.toLowerCase().includes("female")
);

if(female) msg.voice = female;

msg.rate = 0.9;
msg.pitch = 1.5;

speechSynthesis.speak(msg);
}

/* ================= CHART ================= */
let data=[10,20,25,30,35,40,45];

new Chart(document.getElementById("chart"),{
type:"line",
data:{
labels:data.map((_,i)=>i),
datasets:[{
data:data,
borderColor:"#00ffcc",
tension:0.4
}]
}
});

/* ================= ECLIPSE 3D ================= */
const ctx=document.getElementById("eclipse").getContext("2d");

function draw(){
ctx.clearRect(0,0,400,300);

/* SUN */
ctx.beginPath();
ctx.arc(200,150,60,0,Math.PI*2);
ctx.fillStyle="yellow";
ctx.fill();

/* MOON (ECLIPSE EFFECT) */
let x = 200 + Math.sin(Date.now()*0.0015)*85;

ctx.beginPath();
ctx.arc(x,150,55,0,Math.PI*2);
ctx.fillStyle="black";
ctx.fill();

/* glow effect */
ctx.beginPath();
ctx.arc(200,150,65,0,Math.PI*2);
ctx.strokeStyle="rgba(255,255,0,0.2)";
ctx.stroke();

requestAnimationFrame(draw);
}
draw();

</script>

</body>
</html>
