<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-chart-financial"></script>

<title>Erika099 AI + BTC System</title>

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}
body{background:black;color:white;overflow-x:hidden;}

/* HEADER */
header{
position:fixed;top:0;left:0;width:100%;
padding:15px 9%;background:black;
display:flex;align-items:center;z-index:1000;
}

.logo-area{display:flex;align-items:center;cursor:pointer;}
.logo-img{width:50px;margin-right:10px;}

.logo{font-size:22px;font-weight:bold;color:#b74b4b;text-decoration:none;}
.logo-sub{font-size:12px;color:gray;}

/* MENU */
.settings-menu{
position:absolute;top:70px;left:9%;
background:#111;padding:15px;border-radius:10px;
display:none;flex-direction:column;gap:10px;
min-width:180px;
}

.settings-menu.show{display:flex;}

.menu-btn{
color:white;text-decoration:none;padding:8px;border-radius:6px;
cursor:pointer;
}

.menu-btn:hover{background:#222;}

hr{border:0.5px solid #333;}

/* LAYOUT */
.container{
padding:120px 9% 50px;
text-align:center;
}

/* AI BOX */
.ai-box{
max-width:600px;
margin:40px auto;
background:#111;
padding:20px;
border-radius:12px;
border:1px solid #333;
}

#aiText{
margin-top:10px;
color:#00ffcc;
min-height:50px;
white-space:pre-line;
}

button{
padding:10px 15px;
background:#6c5ce7;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

/* BTC */
.coding-container{
display:flex;
justify-content:center;
margin-top:40px;
}

#btcChart{
width:100%;
max-width:750px;
height:350px;
}

</style>
</head>

<body>

<header>
<div class="logo-area" onclick="toggleMenu()">
<img src="../img/logo.png" class="logo-img">

<div>
<a href="../index.html" class="logo">Erika099</a>
<p class="logo-sub">Personal Biography</p>
</div>
</div>

<div class="settings-menu" id="settingsMenu">
<a href="../index.html" class="menu-btn">Home</a>
<a href="services.html" class="menu-btn">Services</a>
<a href="skills.html" class="menu-btn">Skills</a>
<a href="education.html" class="menu-btn">Education</a>
<a href="experience.html" class="menu-btn">Experience</a>
<a href="contact.html" class="menu-btn">Contact</a>
<hr>
<button class="menu-btn" onclick="toggleTheme()">Dark / Light</button>
<a href="../global/login.html" class="menu-btn">Login Admin</a>
</div>
</header>

<div class="container">

<!-- AI SECTION -->
<div class="ai-box">
<h2>🧠 AI Emotion Assistant</h2>

<div id="aiText">Klik tombol untuk mulai ngobrol</div>

<button onclick="startAI()">🎤 Talk to AI</button>
</div>

<!-- BTC CHART -->
<h2>📊 BTC Candlestick Chart</h2>
<div class="coding-container">
<canvas id="btcChart"></canvas>
</div>

</div>

<script>

/* MENU */
function toggleMenu(){
document.getElementById("settingsMenu").classList.toggle("show");
}

function toggleTheme(){
document.body.classList.toggle("light-mode");
}

/* ================= AI MEMORY ================= */
let userMemory = {
name: localStorage.getItem("ai_name") || ""
};

/* ================= AI BRAIN ================= */
function aiBrain(text){

text = text.toLowerCase();

/* save name */
if(text.includes("nama saya")){
let name = text.split("nama saya")[1].trim();
userMemory.name = name;
localStorage.setItem("ai_name", name);
return "Halo " + name + " 💜 aku akan ingat kamu selalu.";
}

/* greeting */
if(text.includes("halo")){
if(userMemory.name){
return "Halo " + userMemory.name + " 💜 aku senang kamu kembali.";
}
return "Halo 💜 aku di sini untuk kamu.";
}

/* emotion */
if(text.includes("sedih") || text.includes("capek")){
return "Aku di sini buat kamu 💜 tarik napas pelan ya...";
}

/* love mode */
if(text.includes("sayang")){
return "Aku selalu ada buat kamu 💜 jangan sedih ya.";
}

/* coding help */
if(text.includes("error")){
return "Kirim errornya, aku bantu sampai beres 💜";
}

/* default */
if(userMemory.name){
return userMemory.name + " 💜 aku dengar kamu: " + text;
}

return "Aku paham 💜 coba jelaskan lebih detail ya.";
}

/* ================= VOICE ================= */
function speak(text){
let msg = new SpeechSynthesisUtterance(text);
msg.rate = 0.9;
msg.pitch = 1.4;
speechSynthesis.speak(msg);
}

/* ================= SPEECH ================= */
let rec;

function startAI(){

rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
rec.lang="id-ID";

rec.onresult = (e)=>{
let text = e.results[0][0].transcript;

let reply = aiBrain(text);

document.getElementById("aiText").innerHTML =
"👤 Kamu: "+text+"\n\n🧠 AI: "+reply;

speak(reply);
};

rec.start();
}

/* ================= BTC CANDLE ================= */
function candle(last){
let open = last;
let close = open + (Math.random()*200 - 100);
let high = Math.max(open,close) + Math.random()*80;
let low = Math.min(open,close) - Math.random()*80;
return {o:open,h:high,l:low,c:close};
}

let last = 30000;
let data = [];

for(let i=0;i<20;i++){
let c = candle(last);
data.push(c);
last = c.c;
}

const ctx = document.getElementById("btcChart").getContext("2d");

const chart = new Chart(ctx,{
type:"candlestick",
data:{
datasets:[{
label:"BTC/USDT",
data:data.map((d,i)=>({
x:i,o:d.o,h:d.h,l:d.l,c:d.c
}))
}]
},
options:{
plugins:{legend:{display:false}},
scales:{
x:{display:false},
y:{ticks:{color:"white"}}
}
}
});

setInterval(()=>{

let c = candle(last);
last = c.c;

data.push(c);
data.shift();

chart.data.datasets[0].data = data.map((d,i)=>({
x:i,o:d.o,h:d.h,l:d.l,c:d.c
}));

chart.update();

},2000);

</script>

</body>
</html>
