<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Erika099 + AI Girlfriend</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>

/* ================= RESET ================= */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:black;
color:white;
overflow-x:hidden;
}

/* ================= HEADER ================= */
header{
position:fixed;
top:0;
width:100%;
padding:15px 9%;
background:black;
display:flex;
align-items:center;
border-bottom:1px solid #111;
z-index:1000;
}

.logo-area{
display:flex;
align-items:center;
cursor:pointer;
}

.logo-img{
width:45px;
margin-right:10px;
}

.logo{
color:#b74b4b;
font-size:22px;
text-decoration:none;
font-weight:bold;
}

/* ================= MENU ================= */
.menu{
position:absolute;
top:70px;
left:9%;
background:#111;
padding:15px;
border-radius:10px;
display:none;
flex-direction:column;
gap:10px;
}

.menu.show{display:flex;}

.menu a{
color:white;
text-decoration:none;
padding:8px;
border-radius:6px;
}

/* ================= SECTION ================= */
section{
padding-top:120px;
text-align:center;
}

/* ================= TIMELINE ================= */
.timeline-item{
background:#111;
margin:20px;
padding:20px;
border-radius:10px;
border:1px solid #222;
}

/* ================= NEWS ================= */
.news{
max-width:1000px;
margin:auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
padding:20px;
}

.news-item{
background:#111;
padding:15px;
border-radius:10px;
border:1px solid #222;
}

/* ================= AI PANEL ================= */
.ai-box{
margin:40px auto;
max-width:500px;
background:#111;
padding:20px;
border-radius:12px;
border:1px solid #222;
}

.ai-face{
width:100px;
height:100px;
border-radius:50%;
background:linear-gradient(145deg,#ff6ec7,#6c5ce7);
margin:auto;
animation:float 3s infinite ease-in-out;
}

@keyframes float{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-10px)}
}

.wave{
display:flex;
justify-content:center;
gap:3px;
margin-top:10px;
}

.bar{
width:4px;
height:10px;
background:white;
animation:wave 1s infinite;
}

@keyframes wave{
0%,100%{height:6px}
50%{height:20px}
}

#aiText{
margin-top:10px;
font-size:14px;
}

/* ================= CANVAS ================= */
#planetCanvas{
width:100%;
height:400px;
margin-top:30px;
}

</style>
</head>

<body>

<header>
<div class="logo-area" onclick="toggleMenu()">
<img src="../img/logo.png" class="logo-img">
<a href="../index.html" class="logo">Erika099</a>
</div>

<div class="menu" id="menu">
<a href="../index.html">Home</a>
<a href="skills.html">Skills</a>
<a href="education.html">Education</a>
<a href="contact.html">Contact</a>
</div>
</header>

<section>

<h1>My Education</h1>

<div class="timeline-item">Elementary School</div>
<div class="timeline-item">Junior High School</div>
<div class="timeline-item">Senior High School</div>
<div class="timeline-item">Self Learning Programming</div>

<!-- ================= AI GIRLFRIEND ================= -->
<div class="ai-box">
<div class="ai-face"></div>

<div class="wave">
<div class="bar"></div><div class="bar"></div><div class="bar"></div>
<div class="bar"></div><div class="bar"></div>
</div>

<div id="aiText">AI siap ngobrol 💜 (klik tombol mic)</div>

<button onclick="startAI()" style="margin-top:10px;padding:10px;background:#6c5ce7;color:white;border:none;border-radius:8px;">
🎤 Talk to AI
</button>
</div>

<!-- CHART -->
<div id="chartBox">
<h2>Crypto Style Chart</h2>
<canvas id="chart"></canvas>
</div>

<h2>3D Earth</h2>
<canvas id="planetCanvas"></canvas>

<h2>Education News</h2>
<div class="news" id="news">Loading...</div>

</section>

<script>

/* ================= MENU ================= */
function toggleMenu(){
document.getElementById("menu").classList.toggle("show");
}

/* ================= AI SYSTEM ================= */
let recognition;

function startAI(){

recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
recognition.lang="id-ID";

recognition.onresult = async (e)=>{
let text = e.results[0][0].transcript;

document.getElementById("aiText").innerText = "Kamu: " + text;

let reply = await fakeAI(text);

document.getElementById("aiText").innerText = "AI: " + reply;

speak(reply);
};

recognition.start();
}

/* ================= SIMPLE AI (NO API biar jalan langsung) ================= */
function fakeAI(text){

text = text.toLowerCase();

if(text.includes("sayang")) return "Aku di sini untuk kamu 💜";
if(text.includes("halo")) return "Halo juga, aku senang ngobrol sama kamu 😊";
if(text.includes("marah")) return "Maaf ya... aku nggak mau bikin kamu marah 😢";

return "Aku dengar kamu bilang: " + text;
}

/* ================= VOICE (BROWSER CEWE LEMBUT) ================= */
function speak(text){

let msg = new SpeechSynthesisUtterance(text);
let voices = speechSynthesis.getVoices();

let female = voices.find(v=>v.lang.includes("id") || v.name.toLowerCase().includes("female"));

if(female) msg.voice = female;

msg.rate = 0.9;
msg.pitch = 1.6;

speechSynthesis.speak(msg);
}

/* ================= CHART ================= */
let data=[10,20,15,30,25,40,35,50];

const chart=new Chart(document.getElementById("chart"),{
type:"line",
data:{
labels:data.map((_,i)=>i),
datasets:[{
data:data,
borderColor:"#00ff88",
borderWidth:2,
tension:0.4
}]
},
options:{plugins:{legend:{display:false}},scales:{x:{display:false},y:{display:false}}}
});

/* ================= THREE JS EARTH ================= */
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(75,window.innerWidth/400,0.1,1000);
const renderer=new THREE.WebGLRenderer({canvas:document.getElementById("planetCanvas"),alpha:true});

renderer.setSize(window.innerWidth,400);

const geometry=new THREE.SphereGeometry(2,64,64);
const texture=new THREE.TextureLoader().load("../img/earth.jpg");

const earth=new THREE.Mesh(geometry,new THREE.MeshStandardMaterial({map:texture}));

scene.add(earth);

const light=new THREE.PointLight(0xffffff,1.2);
light.position.set(5,5,5);
scene.add(light);

camera.position.z=5;

function animate(){
requestAnimationFrame(animate);
earth.rotation.y+=0.003;
renderer.render(scene,camera);
}
animate();

/* ================= NEWS ================= */
fetch("https://api.allorigins.win/get?url="+encodeURIComponent("https://news.google.com/rss/search?q=pendidikan&hl=id&gl=ID"))
.then(r=>r.json())
.then(d=>{
let xml=new DOMParser().parseFromString(d.contents,"text/xml");
let items=xml.querySelectorAll("item");

let html="";
items.forEach((it,i)=>{
if(i<6){
html+=`<div class="news-item">
<a href="${it.querySelector("link").textContent}" target="_blank">
${it.querySelector("title").textContent}
</a>
</div>`;
}
});

document.getElementById("news").innerHTML=html;
});

</script>

</body>
    </html>
