<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-chart-financial"></script>

<style>

/* ================= RESET ================= */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background: radial-gradient(circle at top,#0b0f1a,#000);
color:white;
overflow-x:hidden;
}

/* ================= HEADER ================= */
header{
position:fixed;
top:0;
left:0;
width:100%;
padding:15px 9%;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(12px);
border-bottom:1px solid rgba(255,255,255,0.08);
z-index:1000;
}

.logo-area{
display:flex;
align-items:center;
gap:10px;
cursor:pointer;
}

.logo-img{
width:45px;
filter:drop-shadow(0 0 10px cyan);
}

.logo{
font-size:20px;
font-weight:bold;
color:#b74b4b;
text-decoration:none;
}

.logo-sub{
font-size:12px;
color:gray;
}

/* ================= MENU ================= */
.menu-btn{
background:transparent;
border:none;
color:white;
cursor:pointer;
padding:8px 10px;
border-radius:8px;
transition:0.3s;
}

.menu-btn:hover{
background:rgba(255,255,255,0.08);
}

.menu-box{
position:absolute;
top:70px;
right:9%;
background:rgba(20,20,20,0.95);
backdrop-filter:blur(10px);
padding:15px;
border-radius:12px;
display:none;
flex-direction:column;
gap:10px;
min-width:180px;
border:1px solid rgba(255,255,255,0.1);
}

.menu-box.show{
display:flex;
}

/* ================= CONTENT ================= */
.container{
padding:120px 9% 60px;
text-align:center;
}

.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
padding:20px;
border-radius:15px;
border:1px solid rgba(255,255,255,0.1);
margin-top:20px;
}

/* ================= AI BUTTON ================= */
.ai-btn{
position:fixed;
right:20px;
bottom:20px;
width:60px;
height:60px;
border-radius:50%;
background:linear-gradient(45deg,#00ffcc,#6c5ce7);
color:white;
font-size:22px;
border:none;
cursor:pointer;
box-shadow:0 0 20px #00ffcc;
z-index:9999;
}

/* ================= AI IFRAME ================= */
#aiBox{
position:fixed;
right:20px;
bottom:90px;
width:360px;
height:520px;
border:none;
border-radius:15px;
box-shadow:0 0 25px cyan;
display:none;
z-index:9998;
}

/* ================= BTC CHART ================= */
#btcChart{
max-width:750px;
margin:30px auto;
background:rgba(255,255,255,0.03);
padding:10px;
border-radius:12px;
}

/* ================= TITLE ================= */
h2{
margin-top:25px;
text-shadow:0 0 10px rgba(0,255,255,0.2);
}

</style>
</head>

<body>

<!-- ================= HEADER ================= -->
<header>

<div class="logo-area" onclick="location.href='../index.html'">
<img src="../img/logo.png" class="logo-img">

<div>
<a href="../index.html" class="logo">Erika099</a>
<div class="logo-sub">AI Education System</div>
</div>

</div>

<div>
<button class="menu-btn" onclick="toggleMenu()">☰ Menu</button>

<div class="menu-box" id="menuBox">

<a href="../index.html" class="menu-btn">Home</a>
<a href="services.html" class="menu-btn">Services</a>
<a href="skills.html" class="menu-btn">Skills</a>

<hr style="border:0.5px solid #333">

<a class="menu-btn" onclick="toggleAI()">🤖 Open AI</a>

</div>

</div>

</header>

<!-- ================= CONTENT ================= -->
<div class="container">

<h2>🧠 AI Learning System</h2>

<div class="card">
<p>Selamat datang di AI Erika099 🚀</p>
<p>Belajar coding + AI assistant + market analysis.</p>
</div>

<h2>📊 BTC MARKET CHART</h2>
<canvas id="btcChart"></canvas>

</div>

<!-- ================= AI BUTTON ================= -->
<button class="ai-btn" onclick="toggleAI()">🤖</button>

<!-- AI PANEL -->
<iframe id="aiBox" src="ai/assistant.html"></iframe>

<!-- ================= SCRIPT ================= -->
<script>

/* MENU */
function toggleMenu(){
document.getElementById("menuBox").classList.toggle("show");
}

/* AI PANEL */
function toggleAI(){
let box=document.getElementById("aiBox");
box.style.display=(box.style.display==="block")?"none":"block";
}

/* ================= BTC REAL CHART ================= */

const ctx = document.getElementById("btcChart").getContext("2d");

const chart = new Chart(ctx,{
type:"candlestick",
data:{
datasets:[{
label:"BTC/USDT",
data:[]
}]
},
options:{
plugins:{legend:{display:false}},
scales:{
x:{ticks:{color:"white"}},
y:{ticks:{color:"white"}}
}
}
});

/* ================= AMBIL DATA BINANCE ================= */
async function loadBTC(){
try{
const res = await fetch("https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=15m&limit=30");
const raw = await res.json();

const data = raw.map((d,i)=>({
x:i,
o:parseFloat(d[1]),
h:parseFloat(d[2]),
l:parseFloat(d[3]),
c:parseFloat(d[4])
}));

chart.data.datasets[0].data = data;
chart.update();

/* harga terakhir */
if(data.length > 0){
let lastPrice = data[data.length-1].c;
document.getElementById("priceNow").innerText =
"BTC Price: $" + lastPrice.toLocaleString();
}

}catch(e){
console.log("Error BTC:",e);
}
}

/* LOAD AWAL */
loadBTC();

/* AUTO UPDATE */
setInterval(loadBTC,10000);

const ctx=document.getElementById("btcChart").getContext("2d");

const chart=new Chart(ctx,{
type:"candlestick",
data:{
datasets:[{
label:"BTC/USDT",
data:data.map((d,i)=>({
x:i,o:d.o,h:d.h,l:d.l,c:d.c
}))
}]
},
options:{
plugins:{legend:{display:false}},
scales:{
x:{display:false},
y:{ticks:{color:"white"}}
}
}
});

setInterval(()=>{
let c=candle(last);
last=c.c;

data.push(c);
data.shift();

chart.data.datasets[0].data=data.map((d,i)=>({
x:i,o:d.o,h:d.h,l:d.l,c:d.c
}));

chart.update();
},2000);

</script>

</body>
</html>
