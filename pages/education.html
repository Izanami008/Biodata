<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Erika099 AI FULL ONE FILE</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
body{
margin:0;
background:black;
color:white;
font-family:sans-serif;
overflow-x:hidden;
}

header{
padding:15px;
background:#111;
text-align:center;
border-bottom:1px solid #222;
}

section{
padding:20px;
text-align:center;
}

.ai-box{
background:#111;
padding:15px;
border-radius:10px;
margin:20px auto;
max-width:400px;
border:1px solid #333;
}

button{
padding:10px;
background:#6c5ce7;
border:none;
color:white;
border-radius:8px;
cursor:pointer;
}

canvas{
margin-top:20px;
}

.news-item{
background:#111;
margin:10px;
padding:10px;
border-radius:8px;
}
</style>
</head>

<body>

<header>
💜 Erika099 AI GIRLFRIEND FULL SYSTEM
</header>

<section>

<h2>💜 AI Assistant</h2>

<div class="ai-box">
<div id="text">Klik tombol dan bicara</div>
<button onclick="startAI()">🎤 Start Talk</button>
</div>

<h3>📊 Chart</h3>
<canvas id="chart"></canvas>

<h3>🌍 Earth</h3>
<canvas id="earth" width="400" height="300"></canvas>

<h3>📰 News</h3>
<div id="news">Loading...</div>

</section>

<script>

/* ================= VOICE INPUT ================= */
let recognition;

function startAI(){

recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
recognition.lang="id-ID";

recognition.onresult = async (e)=>{
let text = e.results[0][0].transcript;

document.getElementById("text").innerHTML = "Kamu: " + text;

let reply = aiBrain(text);

document.getElementById("text").innerHTML += "<br>AI: " + reply;

speak(reply);
};

recognition.start();
}

/* ================= AI BRAIN (SMART LOCAL) ================= */
function aiBrain(text){

text = text.toLowerCase();

if(text.includes("halo")) return "Halo sayang 💜 aku di sini";
if(text.includes("siapa kamu")) return "Aku AI teman kamu yang selalu nemenin kamu";
if(text.includes("sayang")) return "Aku juga sayang kamu 💜";
if(text.includes("marah")) return "Maaf ya... jangan marah 😢";

return "Aku dengar kamu bilang: " + text;
}

/* ================= VOICE CEWE LEMBUT ================= */
function speak(text){

let msg = new SpeechSynthesisUtterance(text);

let voices = speechSynthesis.getVoices();

let female = voices.find(v =>
v.name.toLowerCase().includes("female") ||
v.lang.includes("id") ||
v.lang.includes("en")
);

if(female) msg.voice = female;

msg.rate = 0.9;
msg.pitch = 1.6;

speechSynthesis.speak(msg);
}

/* ================= CHART ================= */
let data=[10,20,30,25,40,35];

new Chart(document.getElementById("chart"),{
type:"line",
data:{
labels:data.map((_,i)=>i),
datasets:[{
data:data,
borderColor:"#00ff88",
tension:0.4
}]
}
});

/* ================= EARTH ================= */
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(75,400/300,0.1,1000);
const renderer=new THREE.WebGLRenderer({canvas:document.getElementById("earth")});

const geo=new THREE.SphereGeometry(2,32,32);
const mat=new THREE.MeshBasicMaterial({color:0x00ff88});
const earth=new THREE.Mesh(geo,mat);

scene.add(earth);
camera.position.z=5;

function animate(){
requestAnimationFrame(animate);
earth.rotation.y+=0.01;
renderer.render(scene,camera);
}
animate();

/* ================= NEWS ================= */
fetch("https://api.allorigins.win/get?url="+encodeURIComponent("https://news.google.com/rss/search?q=pendidikan"))
.then(r=>r.json())
.then(d=>{
let xml=new DOMParser().parseFromString(d.contents,"text/xml");
let items=xml.querySelectorAll("item");

let html="";
items.forEach((it,i)=>{
if(i<5){
html+=`
<div class="news-item">
<a href="${it.querySelector("link").textContent}" target="_blank">
${it.querySelector("title").textContent}
</a>
</div>`;
}
});

document.getElementById("news").innerHTML=html;
});

</script>

</body>
</html>
